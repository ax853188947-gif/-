黄金交易所的黄金 T+D 的价格是 250 元 /克，而期货市场远期合约报价为 255 元/克。未来黄金价格进一步上涨，届时黄金的采购成本将会扩大。"},{"id":217,"question":"辉瑞疫苗临床研究与开发高级副总裁威廉称，“这是关乎世界、美国和公共卫生的新闻。”他说，这甚至比他所希望的最好结果还要好。BioNTech 首席执行官Ugur Sahin表示，由于此前预计第一批疫苗的有效性在60％到70％之间，因此“有效性超过 90％是非同寻常的”。 1、材料中的事件对于金价的影响来看，不考虑其他因素，以下走势哪一个是当天金价的走势？（  ）","options":{"A":"A                                        B","B":"C                                        D","C":"从影响金价因素的四个层次来看，材料中的事件属于哪一个层次？（B）","D":"国际地缘政治"},"answer":"C","material":"材料 58 北京时间 2020 年 11 月 9 日晚间，一则重磅消息引爆全球市场：辉瑞和 BioNTech 联合研发的 mRNA 新冠疫苗阻止了 90%的新冠感染。 辉瑞和 BioNTech 宣布，他们联合研制的新冠候选疫苗 BNT162b2 在第 III 期临床试验研究的中期分析中取得了重大进展。 双盲试验中，在第二次注射后 7 天，疫苗有效性超过 90%，这意味着首次注射 28 天后就能达到保护效果。 本次试验共有 43538 名志愿者，其中 42%的人来自不同的地区，目前共发生了 94 例感染。 除此之外，在安全性上，本次试验没有发生严重不良反应，后续将继续收集有关安全性的数据。 若该疫苗完全达到安全性和有效性的要求，辉瑞和 BioNTech 就计划向美 FDA 提交紧急使用授权(EUA)，目前该计划预计将在 11 月的第三周进行。 据试验计划，该实验在达到 164 例感染的时将进行最终的数据分析，以进一步收集数据并确定候选疫苗的安全性和有效性。 关于该疫苗的生产，预计辉瑞和 BioNTech 今年可以生产 5000 万剂次， 2021 年可以生产 13 亿剂次。"},{"id":218,"question":"为了应对新冠疫情的影响，各国采取了怎样的政策组合？（  ）","options":{"A":"宽松的财政政策和宽松的货币政策","B":"紧缩的财政政策和宽松的货币政策","C":"宽松的财政政策和紧缩的货币政策","D":"紧缩的财政政策和紧缩的货币政策 4、新冠疫情爆发之后，投资者作出以下判断，哪一个判断不符合基本面分析的逻辑？（B）"},"answer":"A","material":"材料 58 北京时间 2020 年 11 月 9 日晚间，一则重磅消息引爆全球市场：辉瑞和 BioNTech 联合研发的 mRNA 新冠疫苗阻止了 90%的新冠感染。 辉瑞和 BioNTech 宣布，他们联合研制的新冠候选疫苗 BNT162b2 在第 III 期临床试验研究的中期分析中取得了重大进展。 双盲试验中，在第二次注射后 7 天，疫苗有效性超过 90%，这意味着首次注射 28 天后就能达到保护效果。 本次试验共有 43538 名志愿者，其中 42%的人来自不同的地区，目前共发生了 94 例感染。 除此之外，在安全性上，本次试验没有发生严重不良反应，后续将继续收集有关安全性的数据。 若该疫苗完全达到安全性和有效性的要求，辉瑞和 BioNTech 就计划向美 FDA 提交紧急使用授权(EUA)，目前该计划预计将在 11 月的第三周进行。 据试验计划，该实验在达到 164 例感染的时将进行最终的数据分析，以进一步收集数据并确定候选疫苗的安全性和有效性。 关于该疫苗的生产，预计辉瑞和 BioNTech 今年可以生产 5000 万剂次， 2021 年可以生产 13 亿剂次。"},{"id":219,"question":"辉瑞公布疫苗实验结果，从基本面分析的角度来看，将会对金价产生什么样的影响。（  ）","options":{"A":"避险情绪回落，美元指数回落，从而推动金价持续走高。","B":"全球经济复苏确定性增强，通胀稳步走高，推动金价持续走高。","C":"美国经济加快复苏，美元指数走强，打压金价走势。","D":"美国经济加快复苏，利率中枢逐渐抬升，金价持续走低。"},"answer":"D","material":"材料 58 北京时间 2020 年 11 月 9 日晚间，一则重磅消息引爆全球市场：辉瑞和 BioNTech 联合研发的 mRNA 新冠疫苗阻止了 90%的新冠感染。 辉瑞和 BioNTech 宣布，他们联合研制的新冠候选疫苗 BNT162b2 在第 III 期临床试验研究的中期分析中取得了重大进展。 双盲试验中，在第二次注射后 7 天，疫苗有效性超过 90%，这意味着首次注射 28 天后就能达到保护效果。 本次试验共有 43538 名志愿者，其中 42%的人来自不同的地区，目前共发生了 94 例感染。 除此之外，在安全性上，本次试验没有发生严重不良反应，后续将继续收集有关安全性的数据。 若该疫苗完全达到安全性和有效性的要求，辉瑞和 BioNTech 就计划向美 FDA 提交紧急使用授权(EUA)，目前该计划预计将在 11 月的第三周进行。 据试验计划，该实验在达到 164 例感染的时将进行最终的数据分析，以进一步收集数据并确定候选疫苗的安全性和有效性。 关于该疫苗的生产，预计辉瑞和 BioNTech 今年可以生产 5000 万剂次， 2021 年可以生产 13 亿剂次。"},{"id":220,"question":"张三因有较丰富的投资经验，因此在初期进入黄金投资市场时选择短线交易。 以下哪些选项不是黄金短线交易的策略（  ）","options":{"A":"日内单向性为主的交易","B":"炒单交易","C":"日内双向波段交易","D":"趋势交易"},"answer":"D","material":"材料 59 张三投资经验丰富，先后经历过股票市场、期货市场和黄金 T+D 等二级市场。因新冠疫情的影响导致当前全球经济出现衰退，各国央行货币超发，量化宽松政策的实施进一步助推了通货膨胀率。在这个大的宏观背景下，张三看好黄金这类传统的避险保值和抵抗通货膨胀的投资产品。"},{"id":221,"question":"在早期经历过短线交易后，张三基本对黄金投资市场的价格波动规律有了一定的认识，这时张三发现黄金市场可能出现一波较大波段的行情，则选用长线交易策略。以下选项哪些不是长线策略交易需要主要的内容（  ）","options":{"A":"顺势交易、如何加码","B":"让利润持续发展、抓取波段利润","C":"风险控制、让利润持续发展","D":"如何加码、风险控制"},"answer":"B","material":"材料 59 张三投资经验丰富，先后经历过股票市场、期货市场和黄金 T+D 等二级市场。因新冠疫情的影响导致当前全球经济出现衰退，各国央行货币超发，量化宽松政策的实施进一步助推了通货膨胀率。在这个大的宏观背景下，张三看好黄金这类传统的避险保值和抵抗通货膨胀的投资产品。"},{"id":222,"question":"张三在后续的黄金投资交易中，参与了黄金期权投资，影响黄金期权价值的主要因素不包含（  ）","options":{"A":"黄金的市场价格、执行价格","B":"波动率、持有规模","C":"距离到期日的剩余时间、无风险利率","D":"执行价格、波动率"},"answer":"B","material":"材料 59 张三投资经验丰富，先后经历过股票市场、期货市场和黄金 T+D 等二级市场。因新冠疫情的影响导致当前全球经济出现衰退，各国央行货币超发，量化宽松政策的实施进一步助推了通货膨胀率。在这个大的宏观背景下，张三看好黄金这类传统的避险保值和抵抗通货膨胀的投资产品。"},{"id":223,"question":"2020 年突发的新冠疫情引发全球性投资市场遭到抛售，随后黄金出现一波快速上涨的过程。张三需要分析此次黄金价格上涨的主要原因，考虑到影响黄金价格的因素复杂多变，运用排除法，回答以下最接近正确答案的选项为（  ）","options":{"A":"供需关系","B":"宏观经济","C":"季节性波动规律","D":"地缘政治"},"answer":"B","material":"材料 59 张三投资经验丰富，先后经历过股票市场、期货市场和黄金 T+D 等二级市场。因新冠疫情的影响导致当前全球经济出现衰退，各国央行货币超发，量化宽松政策的实施进一步助推了通货膨胀率。在这个大的宏观背景下，张三看好黄金这类传统的避险保值和抵抗通货膨胀的投资产品。"},{"id":224,"question":"在参与黄金投资市场的过程中，张三发现从基本面分析探索黄金价格涨跌的内因，可进行有效的长期投资，这样避免了运用纯技术方法导致的趋势方向不明确的判定弊端，以下选项中哪些是基本面分析的优势（  ）","options":{"A":"基本面分析具有稳定性、有利于把握大趋势","B":"基本面分析具有综合性、对投资者素质要求较高","C":"解放投资者、可精准把握投资趋势","D":"有利于把握大趋势、避免小波段交易"},"answer":"A","material":"材料 59 张三投资经验丰富，先后经历过股票市场、期货市场和黄金 T+D 等二级市场。因新冠疫情的影响导致当前全球经济出现衰退，各国央行货币超发，量化宽松政策的实施进一步助推了通货膨胀率。在这个大的宏观背景下，张三看好黄金这类传统的避险保值和抵抗通货膨胀的投资产品。"},{"id":225,"question":"9 月份现货黄金价格跌至 226 元/克，而 9 月期货跌至 228 元/克，此时如何操作，其套期保值的结果如何（  ）？","options":{"A":"该黄金企业在现货市场上面以 226 元/克的价格出售 0.4 吨黄金，同时将 9 月黄金期货价格为 228 元/克的空头合约平仓。黄金现货少卖 20 元/克，黄金期货平仓后盈利 20 元/克，套期保值的结果为期现盈亏正好对冲。","B":"该黄金企业在现货市场上面以 226 元/克的价格出售 0.4 吨黄金，而 9 月黄金期货暂时继续持有，等待盈利继续扩大。","C":"该黄金企业将 9 月黄金期货合约以 228 元/克平仓了结，将 0.4 吨黄金的销售计划延后 1 个月。","D":"该黄金企业在现货市场上面以 226 元/克的价格出售 0.4 吨黄金，同时将 9 月黄金期货价格为 228 元/克的空头合约平仓。黄金现货少卖 20 元/克，黄金期货平仓后盈利 22 元/克，套期保值的结果为锁定销售后额外获得 2 元/克的收益。"},"answer":"A","material":"材料 61 国内某家黄金生产企业，计划在 2019 年 9 月将生产出黄金 0.4 吨，而现在的黄金现货价格为每克 246 元，如果按照这个价格将黄金销售出去，将对企业非常有利，而此时 9 月黄金期货合约价格为 248 元/克。"},{"id":226,"question":"图中方框处的下跌主要原因是？（  ）","options":{"A":"美联储准备加息","B":"美联储准备退出 QE","C":"美联储收缩资产负债表","D":"美联储大规模抛售黄金"},"answer":"B","material":"材料 64 Au（T+D）合约的周 K 线走势图。请看图并结合相关知识回答以下问题。"},{"id":227,"question":"投资者在方框处做空，做空价格大概在 330 元/克，下跌至 240 元/克时平仓离场，投资者做空了 10 手，不计算手续费和递延费，投资者盈亏为多少？（  ）","options":{"A":"900,000 元","B":"-900,000 元","C":"-90,000 元","D":"90,000 元"},"answer":"A","material":"材料 64 Au（T+D）合约的周 K 线走势图。请看图并结合相关知识回答以下问题。"},{"id":228,"question":"黄金加工企业收到定金后，当日以 275.56 元/克的价格买入黄金原料 100 千克，同时期货市场的黄金期货主力合约报价为 278.60 元/克。但是在 20 个工作日加工期间，如果黄金价格下跌那么将会面临风险，该企业应该如何规避风险（  ）？","options":{"A":"加工企业在买入现货黄金原料后，同时在期货市场以 278.60 元/克卖出黄金期货主力合约 100 手。","B":"加工企业在买入现货黄金原料后，同时在期货市场以 278.60 元/克卖出黄金期货主力合约 50 手。","C":"加工企业在买入现货黄金原料后，同时在期货市场以 278.60 元/克买入黄金期货主力合约 100 手。","D":"加工企业在买入现货黄金原料后，同时在期货市场以 278.60 元/克买入黄金期货主力合约 50 手。"},"answer":"A","material":"材料 65 国内某大型黄金加工企业与国内某黄金珠宝零售商签订一份订购黄金首饰合同，重 100 千克，加工企业按照零售商公司的设计进行加工，20 个工作日必须交割，加工费 5 元/克，价格按照收货当日现货黄金价格计算，定金 200 万元，余款在收验货品后支付。为降低企业风险，该黄金加工企业将在期货市场采取措施。回答下列问题。"},{"id":229,"question":"该加工企业按时完成后交付给零售商，但在加工期间，现货黄金价格下跌 2.5 元/克，而黄金期货主力合约下跌 2.6 元/克。请核算该加工企业的盈亏情况 （  ）？","options":{"A":"500000 元，合计盈利 510000 元。","B":"500000 元，合计盈利 456000 元。","C":"500000 元，合计 550000 元。","D":"现货黄金原料价格亏损 260000 元，期货盈利 250000 元，加工费收入"},"answer":"A","material":"材料 65 国内某大型黄金加工企业与国内某黄金珠宝零售商签订一份订购黄金首饰合同，重 100 千克，加工企业按照零售商公司的设计进行加工，20 个工作日必须交割，加工费 5 元/克，价格按照收货当日现货黄金价格计算，定金 200 万元，余款在收验货品后支付。为降低企业风险，该黄金加工企业将在期货市场采取措施。回答下列问题。"},{"id":230,"question":"接上题，黄金零售商公司收到这批黄金首饰后，计划在下一个季度全部销售出去，此期间这批黄金首饰成为库存。如果黄金价格继续下跌将会面临亏损的风险，应该如何规避亏损的风险（  ）？","options":{"A":"在黄金期货市场以 276.00 元/克的价格卖出 100 手黄金期货主力合约。","B":"在黄金期货市场以 278.60 元/克的价格卖出 100 手黄金期货主力合约。","C":"在黄金期货市场以 276.00 元/克的价格买入 100 手黄金期货主力合约。","D":"在黄金期货市场以 278.60 元/克的价格卖出 100 手黄金期货主力合约。"},"answer":"A","material":"材料 65 国内某大型黄金加工企业与国内某黄金珠宝零售商签订一份订购黄金首饰合同，重 100 千克，加工企业按照零售商公司的设计进行加工，20 个工作日必须交割，加工费 5 元/克，价格按照收货当日现货黄金价格计算，定金 200 万元，余款在收验货品后支付。为降低企业风险，该黄金加工企业将在期货市场采取措施。回答下列问题。"},{"id":231,"question":"零售公司采购的 100kg 黄金首饰销售并未如预期般顺利，一个月后仍余下 20kg 库存，为了回笼资金，公司再次找到加工企业，希望企业能够回购黄金。如果加工企业与零售公司签订回购合同后，在其他条件不变的情况下加工企业需要（  ）进行套期保值。","options":{"A":"买入套期保值","B":"卖出套期保值","C":"不需要进行套保","D":"卖出现货，同时买入期货"},"answer":"B","material":"材料 65 国内某大型黄金加工企业与国内某黄金珠宝零售商签订一份订购黄金首饰合同，重 100 千克，加工企业按照零售商公司的设计进行加工，20 个工作日必须交割，加工费 5 元/克，价格按照收货当日现货黄金价格计算，定金 200 万元，余款在收验货品后支付。为降低企业风险，该黄金加工企业将在期货市场采取措施。回答下列问题。"},{"id":232,"question":"图中红线使用的是那种技术指标：（  ）","options":{"A":"趋势线","B":"黄金分割","C":"通道线","D":"压力支撑"},"answer":"B","material":"材料 66 下图为黄金 T+D 产品的周线图，2020 年 8 月，黄金 T+D 价格达到历史高 点 449.45 元后一路呈现回落趋势，请仔细观察该图后回答问题。"},{"id":233,"question":"利用黄金分割线判断反弹幅度以下错误的是（  ）。","options":{"A":"当金价从高位下跌过程中出现反弹，当这种反弹高度未到 0.382 线处，就又重新下跌，则意味着这种反弹是弱势反弹，金价未来的跌势可能会更加凶猛。","B":"当金价从高位下跌过程中出现反弹，当金价的反弹高度未到 0.5 线处，就重新下跌，则预示着这种反弹是下跌途中的中级抵抗，下跌行情尚未结束。","C":"当金价从高位下跌过程中出现反弹，当金价的反弹高度达到 0.618 线处时，说明金价的下跌趋势将趋缓，下跌行情也有可能转向横向整理的行情。","D":"当金价从高位下跌过程中出现反弹，当金价的反弹高度未到 0.5 线处，则预示着这种反弹是反转，下跌行情结束。"},"answer":"D","material":"材料 66 下图为黄金 T+D 产品的周线图，2020 年 8 月，黄金 T+D 价格达到历史高 点 449.45 元后一路呈现回落趋势，请仔细观察该图后回答问题。"},{"id":234,"question":"图中还出现了移动平均线的技术指标，关于移动平均线 MA 基本应用原则错误的是（  ）。","options":{"A":"移动平均线从下降开始走平，金价从下向上穿过移动平均线时买入。","B":"移动平均线上升，金价也上升，同时两者距离不远，均线保持对金价的助涨作用，可以买入。","C":"移动平均线下降，金价也向下，金价与均线距离适当，均线保持其助跌作用。","D":"金价跌破移动平均线，经过迅速的下跌或者大幅下跌远离移动平均线，造成时间与空间上的不对应，将使金价继续下跌，应该卖出。"},"answer":"D","material":"材料 66 下图为黄金 T+D 产品的周线图，2020 年 8 月，黄金 T+D 价格达到历史高 点 449.45 元后一路呈现回落趋势，请仔细观察该图后回答问题。"},{"id":235,"question":"当指标处于高位，并形成一峰比一峰低的两个峰，而此时金价却对应的是一峰比一峰高，这就是所谓的（  ）。","options":{"A":"顶背离","B":"底背离","C":"买入信号","D":"超卖"},"answer":"A","material":"材料 66 下图为黄金 T+D 产品的周线图，2020 年 8 月，黄金 T+D 价格达到历史高 点 449.45 元后一路呈现回落趋势，请仔细观察该图后回答问题。"},{"id":236,"question":"假如某投资者以 361 元/克买入 5 手黄金 T+D，此时价格上涨至 366 元/ 克，随后价格回调至 364 的时候再次加仓 5 手，其后黄金 T+D 价格下跌至 363 元/克，临近收盘平仓了结，本次做多操作盈亏状况如何（  ）？（不考虑交易手续费）","options":{"A":"盈利 5000 元","B":"亏损 5000 元","C":"盈利 10000 元","D":"亏损 10000 元"},"answer":"A","material":"材料 66 下图为黄金 T+D 产品的周线图，2020 年 8 月，黄金 T+D 价格达到历史高 点 449.45 元后一路呈现回落趋势，请仔细观察该图后回答问题。"},{"id":237,"question":"在进行套利交易时主要关注合约之间（  ）","options":{"A":"相对价格关系","B":"绝对价格关系","C":"交易品种的差别","D":"交割地的差别"},"answer":"A","material":"材料 67 2020 年 4 月年由于疫情的影响黄金避险情绪大增并屡创新高，同时白银供求收到了很大影响，导致黄金于白银的价差出现扩大，小明为一个专业的机构投资者，在此情况之下决定针对行情进行套利交易，"},{"id":238,"question":"和普通的交易者相比，套利交易者在一段时间内（  ）","options":{"A":"只进行多头操作","B":"只进行空头操作","C":"同时进行多头和空头操作","D":"先进行一种操作在进行另一种操作"},"answer":"C","material":"材料 67 2020 年 4 月年由于疫情的影响黄金避险情绪大增并屡创新高，同时白银供求收到了很大影响，导致黄金于白银的价差出现扩大，小明为一个专业的机构投资者，在此情况之下决定针对行情进行套利交易，"},{"id":239,"question":"理论上，在反向市场牛市套利中，如果价差缩小交易者（  ）","options":{"A":"获利","B":"亏损","C":"保本","D":"以上都可能"},"answer":"B","material":"材料 67 2020 年 4 月年由于疫情的影响黄金避险情绪大增并屡创新高，同时白银供求收到了很大影响，导致黄金于白银的价差出现扩大，小明为一个专业的机构投资者，在此情况之下决定针对行情进行套利交易，"},{"id":240,"question":"跨市套利中，通常决定同一品种在不同交易所间价差的主要因素是（  ）","options":{"A":"运输费用","B":"仓储费用","C":"保险费","D":"利息费"},"answer":"A","material":"材料 67 2020 年 4 月年由于疫情的影响黄金避险情绪大增并屡创新高，同时白银供求收到了很大影响，导致黄金于白银的价差出现扩大，小明为一个专业的机构投资者，在此情况之下决定针对行情进行套利交易，"},{"id":241,"question":"以下关于美联储与金价的关系表述错误的是（  ）","options":{"A":"美国是当今世界唯一的超级大国，美元是美国的货币，因此是美联储的货币政策直接影响金价走势。","B":"《牙买加协议》后，全球进入浮动汇率阶段，美元作为全球最重要的结算货币，是各个国家的主要外汇储备，因此美联储的货币政策直接影响金价走势。","C":"美国是全球最大的资本市场，美国资本市场的任何风吹草动都将影响全球，因此美联储的货币政策直接影响金价走势。","D":"美联储持有全世界最大的黄金储备，因此对于黄金具有定价权。"},"answer":"D","material":"材料 68 2021 年 1 月 6 日周三，美联储公布了 2020 年 12 月 FOMC 议息政策会议纪要。市场高度关注与会官员对“量宽”购债的未来修改计划，纪要显示出增加购债久期的提议并没有得到太多官员支持。这次也是鲍威尔领导下的美联储文件中醒目出现“taper（缩减）”这个词。一些（a number of ）与会者指出，一旦在实现就业和物价目标方面取得了实质性的进一步进展，就可以开始“逐渐减少”购债。 会议纪要的措辞与 12 月 16 日美联储主席鲍威尔在 12 月 16 日 FOMC 后记者会上的言论一致。鲍威尔当时表示，在美国通胀重返正轨之前不会提前加息，并重申美联储可以扩大债券购买力度、调整所购买债券的久期，而在缩减债券购买之前，美联储将提前很久告知市场。"},{"id":242,"question":"美联储意外降息后，对于金价的影响是（  ）","options":{"A":"短期利多，长期利多","B":"短期利多、长期利空","C":"短期利空、长期利空","D":"短期利空、长期利多"},"answer":"D","material":"材料 70 2020 年 3 月 4 日，美股开盘后半小时，美联储突然发布了一篇意外的政策 声明，将美国联邦基金利率的目标区间大幅下调 50 个基点，降至 1%-1.25%。声明写道：“美国经济的基本面仍然强劲，然而，新冠病毒对美国经济活动构成不断发展的风险。鉴于这些风险，同时为了实现最大化就业和价格稳定的双重目标，联邦公开市场委员会 FOMC 今天决定降息。委员会正密切监测事态发展及其对美国经济前景的影响，将使用其工具并采取适当行动支持经济。” 在美联储今日意外降息 50 个基点后，美联储主席鲍威尔表示，美联储在看到新型冠状病毒对经济前景产生实质性影响后，采取了紧急的降息措施。美联储将继续关注新冠状病毒并相应地调整政策。不过他表示，应对措施将以降息而非增加资产购买或量化宽松的形式进行。"},{"id":243,"question":"全球新冠疫情对于金价的影响描述错误的是？（  ）","options":{"A":"新冠疫情影响黄金供应链，导致 2020 年黄金供给不足，推动金价持续攀升。","B":"新冠疫情推动了市场的避险情绪，支撑金价走势。","C":"新冠疫情倒逼政府和央行采取宽松的政策，利多金价走势。","D":"新冠疫情冲击美元体系，利多金价走势。"},"answer":"A","material":"材料 70 2020 年 3 月 4 日，美股开盘后半小时，美联储突然发布了一篇意外的政策 声明，将美国联邦基金利率的目标区间大幅下调 50 个基点，降至 1%-1.25%。声明写道：“美国经济的基本面仍然强劲，然而，新冠病毒对美国经济活动构成不断发展的风险。鉴于这些风险，同时为了实现最大化就业和价格稳定的双重目标，联邦公开市场委员会 FOMC 今天决定降息。委员会正密切监测事态发展及其对美国经济前景的影响，将使用其工具并采取适当行动支持经济。” 在美联储今日意外降息 50 个基点后，美联储主席鲍威尔表示，美联储在看到新型冠状病毒对经济前景产生实质性影响后，采取了紧急的降息措施。美联储将继续关注新冠状病毒并相应地调整政策。不过他表示，应对措施将以降息而非增加资产购买或量化宽松的形式进行。"},{"id":244,"question":"二战以后，世界各国经济快速恢复和增长，功劳是：（  ）","options":{"A":"凯恩斯的功劳","B":"经济自然增长","C":"两者都有","D":"与两者无关"},"answer":"C","material":"材料 71 1929-1933 年危机是资本主义历史上最深刻的一次危机。它使资本主义工商业大幅倒退，使整整几十年生产力的发展成就付之东流。『一战』前的各次危机通常使生产水平倒退一二年，倒退四年或四年以上的情况极少。而 1929-1933 年的危机却使整个资本主义世界的工业生产水平大约后退到 1908-1909 年。其中美国退到 1905-1906 年，德国退到 1896 年，英国退到 1897 年。这次危机不仅限於生产和商业范围，而且也扩展到银行信用系统，以及外汇和债务等领域。生产过剩危机中商品价格下跌，使工业资本家、手工业者、农民等债务人难以支持，从而使许多公司和企业主遭到破产。 美国、德国和法国有几万个股份公司因此倒闭。不仅资本家破产，而且实际上某些资产阶级国家也破产了。 1931 年 9 月，英国被迫放弃金本位制，宣布英镑贬值，震动了世界各国。英联邦以及许多同英镑联系的欧洲国家的金本位制都跟著垮台了。1933 年 3 月间，资本主义世界信用、货币制度崩溃的浪潮袭击了美国。美国银行倒闭之风更加剧烈。到 1933 金市场，形成统一的国际黄金现货市场","D":"1983 至今，金融自由化的浪潮推动世界黄金市场进一步开放，出现多样化的场外黄金衍生工具、融资工具，各国央行在管理黄金储备上更积极地利用国际黄金市场"},"answer":"ABCD","multi":true},{"id":32,"question":"黄金交易具有如下特征（    ）","options":{"A":"全球性","B":"不间断性","C":"权威性","D":"广泛性"},"answer":"ABD","multi":true},{"id":33,"question":"国际黄金市场的参与者非常广泛，包括（    ）","options":{"A":"国际金商","B":"黄金现货企业","C":"中央银行和商业银行","D":"监管机构"},"answer":"ABCD","multi":true},{"id":34,"question":"黄金产业链上游企业包括（    ）","options":{"A":"勘探企业","B":"矿山企业","C":"精炼企业","D":"工业用金企业"},"answer":"ABC","multi":true},{"id":35,"question":"黄金产业链下游企业包括（    ）","options":{"A":"工业用金企业","B":"黄金流通企业","C":"精炼企业。","D":"黄金首饰企业。"},"answer":"AD","multi":true},{"id":36,"question":"上海黄金交易所的黄金现货实盘合约包括以下交易品种（    ）","options":{"A":"Au50g","B":"Au100g","C":"Au500g","D":"Au1000g"},"answer":"AB","multi":true},{"id":37,"question":"上海黄金交易所的黄金现货实盘合约包括以下交易品种（    ）","options":{"A":"Au99.99","B":"Au99.95","C":"Au99.5","D":"Au99"},"answer":"ABC","multi":true},{"id":38,"question":"上海黄金交易所的黄金现货延期交收合约包括（    ）","options":{"A":"Au(T+D)","B":"Au(T+N0)","C":"Au(T+N1)","D":"Au(T+N2)"},"answer":"ACD","multi":true},{"id":39,"question":"以下关于黄金期权交易的表述，正确的是（    ）","options":{"A":"期权是买方在未来约定时间和价位买卖一定数量黄金标的的权利","B":"如果价格走势对期权买方有利，则其会行使权利,从而获利","C":"如果价格走势对期权买方不利，则其会放弃行使权利，从而受损","D":"买卖期权的费用（或称期权的价格）由市场供求双方力量决定。"},"answer":"ABD","multi":true},{"id":40,"question":"黄金价格具有复杂性，因其特性并不完全满足一般价格机制的假设，具体原因是（    ）","options":{"A":"黄金在自然界中以稀缺形式存在，不符合完全竞争市场假设","B":"黄金每年产量十分有限，供给弹性不足","C":"黄金的供求信息产生过程复杂，难以做到完全掌握供给者和需求者的充分信息","D":"各国中央银行和国际金融机构持有或者销售黄金具有战略上的需要，对短期价格不具有敏感性"},"answer":"ABCD","multi":true},{"id":41,"question":"按照不同成色标价，黄金价格可分为（    ）","options":{"A":"纯金价","B":"现货价","C":"标准金价","D":"期货价"},"answer":"AC","multi":true},{"id":42,"question":"以下关于上海黄金交易所的报价规则，正确的是（    ）","options":{"A":"黄金的报价单位为人民币元∕克，最小变动价位为 0.01 元","B":"交易单位为“手”，报价必须以“一手”的整数倍进行","C":"上金所实行保证金制度，保证金分为清算准备金和交易保证金","D":"清算准备金是指会员在保证金账户中存入的确保合约履行的资金，是已被合约占用的资金。"},"answer":"ABC","multi":true},{"id":43,"question":"以下关于上海黄金交易所延期交收交易按买卖方向和交易性质的定义，正确的是（    ）","op （1）正确","C":"只有（2）正确","D":"（1）和（2）均不正确"},"answer":"C"},{"id":23,"question":"以下关于《金融机构互联网黄金业务管理暂行办法》的规定正确的是：（1）代理销售金融机构黄金产品的互联网机构应当具备互联网行业主管部门颁发的许可证或者在互联网行业主管部门完成网站备案，且网站接入地在中华人民共和国境内。","options":{"A":"（1）和（2）均正确","B":"只有（1）正确","C":"只有（2）正确","D":"（1）和（2）均不正确"},"answer":"B"},{"id":24,"question":"以下关于《金融机构互联网黄金业务管理暂行办法》的规定正确的是：（1）金融机构应当在各项风险可控的范围内选择互联网机构，并对互联网机构的资质负责。（2）金融机构和互联网机构在向投资者推介黄金产品时，应当向投资者说明产品特性，并提示产品相关风险。应当做好投资者适当性管理，建立有效的投资者保护机制和风险承受能力评估体系。（    ）","options":{"A":"（1）和（2）均正确","B":"只有（1）正确","C":"只有（2）正确","D":"（1）和（2）均不正确"},"answer":"A"},{"id":25,"question":"以下关于伦敦黄金市场监管制度的论述，错误的是（    ）","options":{"A":"伦敦黄金市场是一个特定的黄金交易所，但对市场的参与主体并无特别的限制","B":"伦敦黄金市场的主要监管机构为英国金融服务管理局","C":"伦敦黄金市场会员通过注册成立理事会，即伦敦金银市场协会(LBMA)，对会员实施管理","D":"伦敦黄金市场的监管内容包括：对会员管理进行监督；对交易市场的交易、结算、交割进行监管；对中介服务的委托协议和经纪服务行为监管。"},"answer":"A"},{"id":26,"question":"以下关于苏黎世黄金市场监管制度的论述，错误的是（    ）","options":{"A":"苏黎世黄金交易所主要由瑞士三大商业私人银行，即瑞士银行、瑞士联合银行、瑞士信贷银行为主导","B":"瑞士黄金市场的监管机构是瑞士金融市场监督管理局","C":"瑞士的黄金体系是一种开放式自由交易的市场体系。","D":"瑞士国民银行代为行使央行管理职能，负责储备货币黄金的管理与运作。"},"answer":"B"},{"id":27,"question":"以下关于日本黄金市场监管制度的论述，错误的是（    ）","options":{"A":"日本黄金市场的基本法律依据是《商品交易所法》、《商品交易所法施行令》和《商品交易所法施行规则》","B":"日本黄金市场只有场内交易，而没有场外交易","C":"日本黄金市场日常运营由日本经济产业部管辖","D":"日本黄金期货市场也受到来自日本商品基金协会、日本商品交易顾问协会、日本商品清算所和全国期货保护基金等机构的监督"},"answer":"B"},{"id":28,"question":"以下哪间公司是世界黄金协会的会员（    ）","options":{"A":"西部黄金股份","B":"山东黄金集团","C":"湖南黄金集团","D":"紫金矿业集团"},"answer":"B"},{"id":29,"question":"以下关于伦敦金银市场协会（LBMA）的表述，错误的是（    ）","options":{"A":"LBMA 是代表伦敦当地黄金和白银批发市场的贸易协会","B":"该市场以交易所形式存在","C":"LBMA 黄金的最小交易量为 1000 金衡制盎司，标准金成色为 99.5%","D":"LBMA 运作方式是通过会员业务完成，它的会员主要分为做市商和普通会员两类"},"answer":"B"},{"id":30,"question":"以下哪一项不是中国黄金协会会员应履行的义务（    ）","options":{"A":"维护协会的合法权益","B":"参加协会组织的活动","C":"执行协会决议","D":"向协会反映情况，及时提供有关资料和信息"},"answer":"B"},{"id":31,"question":"对黄金市场实施监管的主要目的包括（    ）","options":{"A":"维持黄金行业健康运行的秩序","B":"确保黄金领域的服务水平，增进社会福利","C":"使黄金生产企业利润最大化","D":"向国民经济的其他领域传递黄金政策信息"},"answer":"ABD","multi":true},{"id":32,"question":"黄金市场监管的原则包括（    ）","opt   const bankList=document.getElementById('bankList');bankList.innerHTML='';
  [{name:'📗 理论知识题库',desc:'第1-7章教材配套',indices:[3,4,5,6,7,8,9]},{name:'📘 操作技能题库',desc:'单选+材料分析+综合',indices:[0,2,1]}].forEach(cat=>{
    const cT=cat.indices.reduce((s,i)=>s+(QUIZ_DATA.banks[i]?QUIZ_DATA.banks[i].questions.length:0),0);
    const cD=cat.indices.reduce((s,i)=>s+((progress[i]||{}).done||0),0);
    const cW=cat.indices.reduce((s,i)=>s+getWrongQuestions(i).length,0);
    const pct=cT>0?Math.round(Math.min(cD,cT)/cT*100):0;
    const card=document.createElement('div');card.className='bank-card';card.onclick=()=>showSubBanks(cat);
    let info=cT+'题';if(cD>0)info+=' · 已做'+Math.min(cD,cT)+'题';if(cW>0)info+=' · <span style="color:var(--wrong)">'+cW+'错题</span>';
    card.innerHTML='<div class="bank-name">'+cat.name+'</div><div class="bank-info" style="margin-bottom:4px;color:var(--text-dim)">'+cat.desc+'</div><div class="bank-info">'+info+'</div><div class="bank-progress"><div class="bank-progress-bar" style="width:'+pct+'%"></div></div>';
    bankList.appendChild(card);});
}
function showSubBanks(cat){currentCategory=cat;document.getElementById('homeScreen').style.display='none';document.getElementById('subBankScreen').style.display='block';document.getElementById('subBankTitle').textContent=cat.name.replace(/[📘📗]/g,'').trim();const progress=getProgress(),list=document.getElementById('subBankList');list.innerHTML='';cat.indices.forEach(idx=>{const bank=QUIZ_DATA.banks[idx];if(!bank)return;const bp=progress[idx]||{done:0,correct:0};const wc=getWrongQuestions(idx).length,bm=getBookmark(idx),pct=bank.questions.length>0?Math.round(Math.min(bp.done,bank.questions.length)/bank.questions.length*100):0;const card=document.createElement('div');card.className='bank-card';card.onclick=()=>selectBank(idx);let info=bank.questions.length+'题';if(bp.done>0)info+=' · 已做'+Math.min(bp.done,bank.questions.length)+'题';if(wc>0)info+=' · <span style="color:var(--wrong)">'+wc+'错题</span>';if(bm>0)info+=' · <span style="color:var(--primary)">续第'+(bm+1)+'题</span>';card.innerHTML='<div class="bank-name">'+bank.name+'</div><div class="bank-info">'+info+'</div><div class="bank-progress"><div class="bank-progress-bar" style="width:'+pct+'%"></div></div>';list.appendChild(card);});}
function goBackFromConfig(){document.getElementById('configScreen').style.display='none';if(currentCategory){showSubBanks(currentCategory);}else{showHome();}}

function setTypeFilter(type) {
  currentTypeFilter = type;
  document.querySelectorAll('#typeFilter .mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(type === 'all' ? 'typeAll' : type === 'single' ? 'typeSingle' : type === 'multi' ? 'typeMulti' : 'typeMaterial').classList.add('active');
  updateCountOptions();
  updateResumeHint();
}

function getFilteredPool() {
  const allQ = QUIZ_DATA.banks[currentBank].questions;
  if (currentTypeFilter === 'all') return allQ;
  if (currentTypeFilter === 'single') return allQ.filter(q => !q.multi && !q.material);
  if (currentTypeFilter === 'multi') return allQ.filter(q => q.multi);
  if (currentTypeFilter === 'material') return allQ.filter(q => q.material);
  return allQ;
}

function selectBank(idx) {
  currentBank = idx;
  currentMode = 'sequential';
  currentTypeFilter = 'all';
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('subBankScreen').style.display = 'none';
  document.getElementById('configScreen').style.display = 'block';
  document.getElementById('configTitle').textContent = QUIZ_DATA.banks[idx].name;

  // Show/hide type filter based on available types
  const allQ = QUIZ_DATA.banks[idx].questions;
  const hasMulti = allQ.some(q => q.multi);
  const hasMaterial = allQ.some(q => q.material);
  const hasSingle = allQ.some(q => !q.multi && !q.material);
  const typeFilter = document.getElementById('typeFilter');
  
  if (hasMulti || hasMaterial) {
    typeFilter.classList.remove('hidden');
    document.getElementById('typeSingle').style.display = hasSingle ? '' : 'none';
    document.getElementById('typeMulti').style.display = hasMulti ? '' : 'none';
    document.getElementById('typeMaterial').style.display = hasMaterial ? '' : 'none';
    // Reset to all
    document.querySelectorAll('#typeFilter .mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('typeAll').classList.add('active');
  } else {
    typeFilter.classList.add('hidden');
  }

  // Update wrong mode
  const wrongCount = getWrongQuestions(idx).length;
  document.getElementById('wrongCountLabel').textContent = wrongCount + '题';
  const wrongBtn = document.getElementById('modeWrong');
  if (wrongCount === 0) { wrongBtn.classList.add('disabled'); } else { wrongBtn.classList.remove('disabled'); }

  // Reset mode buttons (only in mode section, not type filter)
  document.querySelectorAll('#modeSeq,#modeRandom,#modeWrong').forEach(b => b.classList.remove('active'));
  document.getElementById('modeSeq').classList.add('active');

  updateCountOptions();
  updateResumeHint();
}

function updateCountOptions() {
  let maxQ;
  if (currentMode === 'wrong') {
    maxQ = getWrongQuestions(currentBank).length;
  } else {
    maxQ = getFilteredPool().length;
  }

  // Preset buttons
  const presets = [10, 20, 50, 100].filter(n => n <= maxQ);
  if (maxQ > 100) presets.push(maxQ);
  else if (!presets.includes(maxQ)) presets.push(maxQ);

  const container = document.getElementById('countBtns');
  container.innerHTML = '';
  presets.forEach(n => {
    const btn = document.createElement('div');
    btn.className = 'count-btn' + (n === selectedCount ? ' active' : '');
    btn.textContent = n === maxQ ? '全部(' + n + ')' : n + '题';
    btn.onclick = () => { selectCount(n); };
    container.appendChild(btn);
  });

  document.getElementById('questionCount').value = selectedCount;
  document.getElementById('questionCount').max = maxQ;
  document.getElementById('maxHint').textContent = '/ 最多' + maxQ + '题';

  // Validate current selection
  if (selectedCount > maxQ) { selectCount(Math.min(20, maxQ)); }
}

function selectCount(n) {
  selectedCount = n;
  document.getElementById('questionCount').value = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.count-btn').forEach(b => {
    if (b.textContent.includes(n + '题') || b.textContent.includes('(' + n + ')')) b.classList.add('active');
  });
}

// Custom input change
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('questionCount').addEventListener('change', function() {
    let val = parseInt(this.value);
    const max = parseInt(this.max) || 999;
    if (isNaN(val) || val < 1) val = 1;
    if (val > max) val = max;
    this.value = val;
    selectedCount = val;
    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
  });
});

function setMode(mode) {
  if (mode === 'wrong' && getWrongQuestions(currentBank).length === 0) {
    showModal('暂无错题', '做题后答错的题目会自动收录到错题本。', closeModal, '知道了');
    return;
  }
  currentMode = mode;
  document.querySelectorAll('#modeSeq,#modeRandom,#modeWrong').forEach(b => b.classList.remove('active'));
  document.getElementById(mode === 'sequential' ? 'modeSeq' : mode === 'random' ? 'modeRandom' : 'modeWrong').classList.add('active');

  selectedCount = 20;
  updateCountOptions();
  updateResumeHint();
}

function updateResumeHint() {
  const hint = document.getElementById('resumeHint');
  if (currentMode === 'sequential' && currentTypeFilter === 'all') {
    const bookmark = getBookmark(currentBank);
    if (bookmark > 0) {
      hint.classList.remove('hidden');
      document.getElementById('resumePos').textContent = bookmark + 1;
    } else {
      hint.classList.add('hidden');
    }
  } else {
    hint.classList.add('hidden');
  }
}

function startQuiz() {
  const count = parseInt(document.getElementById('questionCount').value) || 20;
  let pool = [];

  if (currentMode === 'wrong') {
    const wrongIds = getWrongQuestions(currentBank);
    const allQ = QUIZ_DATA.banks[currentBank].questions;
    pool = wrongIds.map(id => allQ.find(q => q.id === id)).filter(Boolean);
    pool = shuffleArray(pool);
  } else if (currentMode === 'random') {
    pool = shuffleArray([...getFilteredPool()]);
  } else {
    // Sequential: resume from bookmark (only when not filtered)
    const allQ = getFilteredPool();
    const bookmark = (currentTypeFilter === 'all') ? getBookmark(currentBank) : 0;
    const safeBookmark = bookmark >= allQ.length ? 0 : bookmark;
    pool = allQ.slice(safeBookmark);
    if (pool.length < count && safeBookmark > 0) {
      // Wrap around
      pool = pool.concat(allQ.slice(0, count - pool.length));
    }
  }

  currentQuestions = pool.slice(0, Math.min(count, pool.length));
  if (currentQuestions.length === 0) {
    showModal('无可用题目', '请选择其他模式或题库。', closeModal, '好的');
    return;
  }

  currentIndex = 0;
  correctCount = 0;
  wrongList = [];
  answered = false;

  document.getElementById('configScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  answered = false;

  document.getElementById('quizProgressText').textContent = (currentIndex + 1) + '/' + currentQuestions.length;
  document.getElementById('quizScoreText').textContent = correctCount + '对 / ' + currentIndex + '题';
  document.getElementById('quizProgressBar').style.width = ((currentIndex + 1) / currentQuestions.length * 100) + '%';
  document.getElementById('questionNum').textContent = '第' + (currentIndex + 1) + '题';
  document.getElementById('questionText').textContent = q.question;

  // Material
  const matBox = document.getElementById('materialBox');
  if (q.material) {
    matBox.classList.remove('hidden');
    materialExpanded = true;
    const parts = q.material.split(' ');
    document.getElementById('materialTitle').textContent = parts[0] || '案例材料';
    document.getElementById('materialContent').textContent = parts.slice(1).join(' ');
    document.getElementById('materialContent').classList.remove('collapsed');
    document.getElementById('materialToggle').textContent = '收起 ▲';
  } else {
    matBox.classList.add('hidden');
  }

  // Options
  const optList = document.getElementById('optionsList');
  optList.innerHTML = '';
  Object.entries(q.options).forEach(([letter, text]) => {
    const opt = document.createElement('div');
    opt.className = 'option';
    opt.dataset.letter = letter;
    opt.onclick = () => selectOption(letter, opt);
    opt.innerHTML = '<div class="option-letter">' + letter + '</div><div class="option-text">' + text + '</div>';
    optList.appendChild(opt);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').classList.remove('visible');

  // Multi-choice: show submit button instead of auto-submit
  const isMulti = q.multi;
  multiSelected = [];
  const submitArea = document.getElementById('submitArea');
  if (isMulti) {
    submitArea.classList.remove('hidden');
    submitArea.querySelector('.submit-btn').disabled = true;
    document.getElementById('questionNum').textContent = '第' + (currentIndex + 1) + '题（多选）';
  } else {
    submitArea.classList.add('hidden');
  }

  // Scroll to top of question
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleMaterial() {
  materialExpanded = !materialExpanded;
  const body = document.getElementById('materialContent');
  const toggle = document.getElementById('materialToggle');
  if (materialExpanded) {
    body.classList.remove('collapsed');
    toggle.textContent = '收起 ▲';
  } else {
    body.classList.add('collapsed');
    toggle.textContent = '展开 ▼';
  }
}

function selectOption(letter, optEl) {
  if (answered) return;
  const q = currentQuestions[currentIndex];

  if (q.multi) {
    // Multi-choice: toggle selection
    const idx = multiSelected.indexOf(letter);
    if (idx >= 0) {
      multiSelected.splice(idx, 1);
      optEl.classList.remove('selected');
    } else {
      multiSelected.push(letter);
      optEl.classList.add('selected');
    }
    // Enable/disable submit button
    document.querySelector('.submit-btn').disabled = multiSelected.length < 2;
    return;
  }

  // Single choice: immediate submit
  answered = true;

  const isCorrect = letter === q.answer;

  optEl.classList.add(isCorrect ? 'correct' : 'wrong');

  if (!isCorrect) {
    document.querySelectorAll('.option').forEach(o => {
      if (o.dataset.letter === q.answer) o.classList.add('show-correct');
    });
  }

  document.querySelectorAll('.option').forEach(o => o.classList.add('disabled'));

  // Feedback with full answer content
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    correctCount++;
    fb.className = 'feedback correct';
    fb.textContent = '✓ 回答正确！';
  } else {
    wrongList.push({ index: currentIndex, question: q, userAnswer: letter });
    fb.className = 'feedback wrong';
    fb.textContent = '✗ 正确答案是 ' + q.answer + '：' + (q.options[q.answer] || '');

    // Save to wrong questions
    const wrongIds = getWrongQuestions(currentBank);
    if (!wrongIds.includes(q.id)) {
      wrongIds.push(q.id);
      saveWrongQuestions(currentBank, wrongIds);
    }
  }

  // Remove from wrong list if correct in wrong mode
  if (isCorrect && currentMode === 'wrong') {
    const wrongIds = getWrongQuestions(currentBank);
    saveWrongQuestions(currentBank, wrongIds.filter(id => id !== q.id));
  }

  // Show next button
  const btn = document.getElementById('nextBtn');
  btn.classList.add('visible');
  btn.textContent = currentIndex < currentQuestions.length - 1 ? '下一题 →' : '查看结果';

  // Scroll to show feedback and next button
  setTimeout(() => { btn.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 100);
}

function submitMulti() {
  if (answered || multiSelected.length < 2) return;
  answered = true;

  const q = currentQuestions[currentIndex];
  const userAnswer = multiSelected.sort().join('');
  const correctAnswer = q.answer; // e.g. "BCDE"
  const isCorrect = userAnswer === correctAnswer;

  // Highlight options
  document.querySelectorAll('.option').forEach(o => {
    const letter = o.dataset.letter;
    o.classList.add('disabled');
    if (correctAnswer.includes(letter)) {
      o.classList.add(multiSelected.includes(letter) ? 'correct' : 'show-correct');
    } else if (multiSelected.includes(letter)) {
      o.classList.add('wrong');
    }
  });

  // Feedback
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    correctCount++;
    fb.className = 'feedback correct';
    fb.textContent = '✓ 回答正确！';
  } else {
    wrongList.push({ index: currentIndex, question: q, userAnswer: userAnswer });
    fb.className = 'feedback wrong';
    const correctLetters = correctAnswer.split('').join('、');
    fb.textContent = '✗ 正确答案是 ' + correctLetters;

    const wrongIds = getWrongQuestions(currentBank);
    if (!wrongIds.includes(q.id)) {
      wrongIds.push(q.id);
      saveWrongQuestions(currentBank, wrongIds);
    }
  }

  if (isCorrect && currentMode === 'wrong') {
    const wrongIds = getWrongQuestions(currentBank);
    saveWrongQuestions(currentBank, wrongIds.filter(id => id !== q.id));
  }

  document.getElementById('submitArea').classList.add('hidden');
  const btn = document.getElementById('nextBtn');
  btn.classList.add('visible');
  btn.textContent = currentIndex < currentQuestions.length - 1 ? '下一题 →' : '查看结果';
  setTimeout(() => { btn.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 100);
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  // Save progress
  const progress = getProgress();
  if (!progress[currentBank]) progress[currentBank] = { done: 0, correct: 0 };
  progress[currentBank].done += currentQuestions.length;
  progress[currentBank].correct += correctCount;
  saveProgress(progress);

  // Save bookmark for sequential mode
  if (currentMode === 'sequential') {
    const lastQ = currentQuestions[currentQuestions.length - 1];
    const allQ = QUIZ_DATA.banks[currentBank].questions;
    const lastIdx = allQ.findIndex(q => q.id === lastQ.id);
    const newBookmark = (lastIdx + 1) >= allQ.length ? 0 : lastIdx + 1;
    saveBookmark(currentBank, newBookmark);
  }

  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const pct = Math.round(correctCount / currentQuestions.length * 100);
  document.getElementById('finalScore').textContent = pct + '%';
  document.getElementById('resultSummary').textContent =
    '共' + currentQuestions.length + '题，答对' + correctCount + '题，答错' + wrongList.length + '题';

  document.getElementById('resultStats').innerHTML =
    '<div class="stat-row"><span>总题数</span><span>' + currentQuestions.length + '</span></div>' +
    '<div class="stat-row"><span>正确</span><span style="color:var(--correct)">' + correctCount + '</span></div>' +
    '<div class="stat-row"><span>错误</span><span style="color:var(--wrong)">' + wrongList.length + '</span></div>' +
    '<div class="stat-row"><span>正确率</span><span style="color:var(--primary)">' + pct + '%</span></div>';

  // Review with full options
  const review = document.getElementById('reviewSection');
  if (wrongList.length > 0) {
    let html = '<div class="review-title">错题回顾 (' + wrongList.length + '题)</div>';
    wrongList.forEach(w => {
      const q = w.question;
      let optsHtml = Object.entries(q.options).map(([k,v]) => k + '. ' + v).join('<br>');
      html += '<div class="review-item">' +
        '<div class="ri-q">' + q.question + '</div>' +
        '<div class="ri-opts">' + optsHtml + '</div>' +
        '<div class="ri-answer"><span class="ri-your">你选：' + w.userAnswer + '</span> · <span class="ri-correct">正确：' + q.answer + '</span></div>' +
        '</div>';
    });
    review.innerHTML = html;
  } else {
    review.innerHTML = '<p style="color:var(--correct);margin-top:16px;font-size:16px">🎉 全部正确！太棒了！</p>';
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retryWrong() {
  if (wrongList.length === 0) {
    showModal('没有错题', '恭喜，全部答对了！', closeModal, '好的');
    return;
  }
  currentQuestions = shuffleArray(wrongList.map(w => w.question));
  currentIndex = 0;
  correctCount = 0;
  wrongList = [];
  answered = false;

  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  renderQuestion();
}

function showHome() {
  document.getElementById('homeScreen').style.display='block';
  document.getElementById('subBankScreen').style.display='none';
  document.getElementById('configScreen').style.display='none';
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='none';
  currentCategory=null;renderHome();
}

function confirmQuit() {
  showModal('退出练习？', '当前进度将不会保存到本次成绩中。', () => { showHome(); }, '退出');
}

function showResetConfirm() {
  showModal('清除所有记录？', '将清除做题进度、错题本和断点记录，此操作不可撤销。', () => {
    // Clear all quiz-related localStorage
    Object.keys(localStorage).forEach(key => {
      if (key.startsWith('gq_')) localStorage.removeItem(key);
    });
    renderHome();
  }, '确认清除');
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

window.addEventListener('DOMContentLoaded', init);
