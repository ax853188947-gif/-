<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>高级黄金投资分析师 - 刷题器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #D4A44C;
  --primary-light: #F5E6C8;
  --correct: #4CAF50;
  --wrong: #F44336;
  --bg: #1a1a2e;
  --card: #16213e;
  --text: #eee;
  --text-dim: #999;
  --border: #2d3748;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
  -webkit-tap-highlight-color: transparent;
}
.container { max-width: 640px; margin: 0 auto; padding: 16px; }

/* Header */
.header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.header h1 { font-size: 20px; color: var(--primary); margin-bottom: 8px; }
.header .subtitle { font-size: 13px; color: var(--text-dim); }

/* Home */
.bank-card {
  background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 12px;
  border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.bank-card:active { transform: scale(0.98); border-color: var(--primary); }
.bank-card .bank-name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.bank-card .bank-info { font-size: 13px; color: var(--text-dim); }
.bank-card .bank-progress { margin-top: 10px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.bank-card .bank-progress-bar { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s; }

/* Stats */
.stats-bar {
  display: flex; justify-content: space-around; background: var(--card);
  border-radius: 10px; padding: 14px; margin-bottom: 16px; border: 1px solid var(--border);
}
.stats-bar .stat { text-align: center; }
.stats-bar .stat-value { font-size: 20px; font-weight: 700; color: var(--primary); }
.stats-bar .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* Mode selector */
.mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
.mode-btn {
  flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 14px; cursor: pointer;
  text-align: center; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.mode-btn:active, .mode-btn.active { border-color: var(--primary); background: rgba(212,164,76,0.1); }
.mode-btn .mode-icon { font-size: 24px; margin-bottom: 4px; }
.mode-btn .mode-label { font-size: 12px; color: var(--text-dim); }
.mode-btn.disabled { opacity: 0.35; pointer-events: none; }

/* Config */
.quiz-screen { display: none; }
.quiz-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; margin-bottom: 16px; }
.quiz-back { font-size: 14px; color: var(--primary); cursor: pointer; padding: 8px 12px; margin: -8px -12px; -webkit-tap-highlight-color: transparent; }
.quiz-progress-text { font-size: 13px; color: var(--text-dim); }
.quiz-score { font-size: 13px; color: var(--primary); font-weight: 600; }

.count-section { margin-bottom: 16px; }
.count-section label { font-size: 14px; display: block; margin-bottom: 8px; }
.count-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.count-btn {
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 13px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.count-btn.active { border-color: var(--primary); background: rgba(212,164,76,0.1); color: var(--primary); }
.count-btn:active { transform: scale(0.95); }
.count-custom {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
}
.count-custom input {
  width: 70px; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 14px; text-align: center;
}
.count-custom span { font-size: 12px; color: var(--text-dim); }

.start-btn {
  width: 100%; padding: 14px; border-radius: 10px; border: none;
  background: var(--primary); color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; margin-top: 16px; -webkit-tap-highlight-color: transparent;
}
.start-btn:active { transform: scale(0.98); opacity: 0.9; }
.start-btn:disabled { opacity: 0.4; pointer-events: none; }

/* Progress bar */
.progress-bar-container { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--primary); transition: width 0.3s; }

/* Material box */
.material-box {
  background: rgba(212,164,76,0.08); border: 1px solid rgba(212,164,76,0.2);
  border-radius: 10px; padding: 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.8;
}
.material-box .material-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.material-box .material-title { font-weight: 600; color: var(--primary); }
.material-box .material-toggle { font-size: 12px; color: var(--primary); }
.material-box .material-body { margin-top: 10px; max-height: 200px; overflow-y: auto; }
.material-box .material-body.collapsed { display: none; }

/* Question card */
.question-card { background: var(--card); border-radius: 14px; padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }
.question-num { font-size: 12px; color: var(--primary); margin-bottom: 8px; }
.question-text { font-size: 15px; line-height: 1.7; margin-bottom: 16px; }

/* Options - larger touch area */
.option {
  display: flex; align-items: flex-start; padding: 14px 16px;
  border: 2px solid var(--border); border-radius: 10px;
  margin-bottom: 10px; cursor: pointer; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent; min-height: 48px;
}
.option:active:not(.disabled) { transform: scale(0.98); }
.option.selected { border-color: var(--primary); background: rgba(212,164,76,0.08); }
.option.correct { border-color: var(--correct); background: rgba(76,175,80,0.1); }
.option.wrong { border-color: var(--wrong); background: rgba(244,67,54,0.1); }
.option.show-correct { border-color: var(--correct); background: rgba(76,175,80,0.08); }
.option-letter {
  width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; margin-right: 12px; flex-shrink: 0;
}
.option.selected .option-letter { border-color: var(--primary); color: var(--primary); }
.option.correct .option-letter { border-color: var(--correct); color: #fff; background: var(--correct); }
.option.wrong .option-letter { border-color: var(--wrong); color: #fff; background: var(--wrong); }
.option.show-correct .option-letter { border-color: var(--correct); color: #fff; background: var(--correct); }
.option-text { font-size: 14px; line-height: 1.6; flex: 1; padding-top: 3px; }
.option.disabled { pointer-events: none; opacity: 0.85; }

/* Feedback */
.feedback { padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; font-size: 14px; line-height: 1.6; display: none; }
.feedback.correct { display: block; background: rgba(76,175,80,0.1); color: var(--correct); }
.feedback.wrong { display: block; background: rgba(244,67,54,0.1); color: var(--wrong); }

/* Next button */
.next-btn {
  width: 100%; padding: 16px; border-radius: 10px; border: none;
  background: var(--primary); color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; display: none; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.next-btn:active { transform: scale(0.98); opacity: 0.9; }
.next-btn.visible { display: block; }

/* Result */
.result-screen { display: none; text-align: center; padding: 40px 20px; }
.result-screen .score-circle {
  width: 140px; height: 140px; border-radius: 50%;
  border: 4px solid var(--primary); display: flex; flex-direction: column;
  align-items: center; justify-content: center; margin: 0 auto 24px;
}
.result-screen .score-num { font-size: 36px; font-weight: 700; color: var(--primary); }
.result-screen .score-label { font-size: 13px; color: var(--text-dim); }
.result-screen .result-stats { margin: 20px 0; }
.result-screen .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.result-actions { display: flex; gap: 10px; margin-top: 24px; }
.result-actions button {
  flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 14px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.result-actions button.primary { background: var(--primary); color: #fff; border: none; }

/* Review */
.review-section { margin-top: 24px; text-align: left; }
.review-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--wrong); }
.review-item { background: var(--card); border-radius: 10px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.review-item .ri-q { font-size: 13px; line-height: 1.6; margin-bottom: 8px; }
.review-item .ri-opts { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; line-height: 1.6; }
.review-item .ri-answer { font-size: 12px; }
.review-item .ri-your { color: var(--wrong); }
.review-item .ri-correct { color: var(--correct); }

/* Modal (replaces confirm()) */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 999; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--card); border-radius: 14px; padding: 24px; margin: 20px; max-width: 320px; width: 100%; text-align: center; }
.modal-box h3 { margin-bottom: 12px; font-size: 16px; }
.modal-box p { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; }
.modal-btns { display: flex; gap: 10px; }
.modal-btns button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
.modal-btns .btn-cancel { background: var(--border); color: var(--text); }
.modal-btns .btn-confirm { background: var(--primary); color: #fff; }

/* Reset button */
.reset-btn { font-size: 12px; color: var(--text-dim); text-align: center; padding: 12px; cursor: pointer; margin-top: 20px; }
.reset-btn:active { color: var(--wrong); }

/* Utilities */
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <!-- Home Screen -->
  <div class="home-screen" id="homeScreen">
    <div class="header">
      <h1>高级黄金投资分析师</h1>
      <div class="subtitle">手机刷题器</div>
    </div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-value" id="totalQuestions">0</div><div class="stat-label">总题数</div></div>
      <div class="stat"><div class="stat-value" id="totalDone">0</div><div class="stat-label">已做</div></div>
      <div class="stat"><div class="stat-value" id="totalAccuracy">--</div><div class="stat-label">正确率</div></div>
    </div>
    <div id="bankList"></div>
    <div class="reset-btn" onclick="showResetConfirm()">清除所有做题记录</div>
  </div>
  <div class="quiz-screen" id="subBankScreen">
    <div class="quiz-header"><div class="quiz-back" onclick="showHome()">← 返回</div><div class="quiz-progress-text" id="subBankTitle">选择题库</div><div></div></div>
    <div id="subBankList"></div>
  </div>
  <!-- Config Screen -->
  <div class="quiz-screen" id="configScreen">
    <div class="quiz-header">
      <div class="quiz-back" onclick="goBackFromConfig()">← 返回</div>
      <div class="quiz-progress-text" id="configTitle">题库设置</div>
      <div></div>
    </div>
    <div class="mode-selector">
      <div class="mode-btn active" id="modeSeq" onclick="setMode('sequential')">
        <div class="mode-icon">📋</div>
        <div>顺序练习</div>
        <div class="mode-label">从头到尾</div>
      </div>
      <div class="mode-btn" id="modeRandom" onclick="setMode('random')">
        <div class="mode-icon">🎲</div>
        <div>随机练习</div>
        <div class="mode-label">打乱顺序</div>
      </div>
      <div class="mode-btn" id="modeWrong" onclick="setMode('wrong')">
        <div class="mode-icon">❌</div>
        <div>错题重做</div>
        <div class="mode-label" id="wrongCountLabel">0题</div>
      </div>
    </div>
    <div class="count-section hidden" id="typeFilter">
      <label>题型筛选：</label>
      <div class="mode-btns">
        <div class="mode-btn active" id="typeAll" onclick="setTypeFilter('all')"><div>全部</div></div>
        <div class="mode-btn" id="typeSingle" onclick="setTypeFilter('single')"><div>单选</div></div>
        <div class="mode-btn" id="typeMulti" onclick="setTypeFilter('multi')"><div>多选</div></div>
        <div class="mode-btn" id="typeMaterial" onclick="setTypeFilter('material')"><div>材料题</div></div>
      </div>
    </div>
    <div class="count-section">
      <label>每次练习题数：</label>
      <div class="count-btns" id="countBtns"></div>
      <div class="count-custom">
        <span>自定义:</span>
        <input type="number" id="questionCount" min="1" inputmode="numeric" pattern="[0-9]*">
        <span id="maxHint">/ 最多0题</span>
      </div>
    </div>
    <div id="resumeHint" class="hidden" style="background:rgba(212,164,76,0.1);border-radius:8px;padding:12px;margin-bottom:12px;font-size:13px;color:var(--primary);">
      📌 上次做到第<span id="resumePos">0</span>题，将从断点继续
    </div>
    <button class="start-btn" id="startBtn" onclick="startQuiz()">开始答题</button>
  </div>

  <!-- Quiz Screen -->
  <div class="quiz-screen" id="quizScreen">
    <div class="quiz-header">
      <div class="quiz-back" onclick="confirmQuit()">← 退出</div>
      <div class="quiz-progress-text" id="quizProgressText">1/20</div>
      <div class="quiz-score" id="quizScoreText">0对</div>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="quizProgressBar"></div>
    </div>
    <div class="material-box hidden" id="materialBox">
      <div class="material-header" onclick="toggleMaterial()">
        <div class="material-title" id="materialTitle"></div>
        <div class="material-toggle" id="materialToggle">收起 ▲</div>
      </div>
      <div class="material-body" id="materialContent"></div>
    </div>
    <div class="question-card">
      <div class="question-num" id="questionNum"></div>
      <div class="question-text" id="questionText"></div>
      <div id="optionsList"></div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="hidden" id="submitArea" style="margin-bottom:12px;">
      <button class="start-btn submit-btn" onclick="submitMulti()" disabled>提交答案</button>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
  </div>

  <!-- Result Screen -->
  <div class="result-screen" id="resultScreen">
    <div class="score-circle">
      <div class="score-num" id="finalScore">0</div>
      <div class="score-label">正确率</div>
    </div>
    <h2 style="margin-bottom:8px">练习完成！</h2>
    <p style="color:var(--text-dim);font-size:13px" id="resultSummary"></p>
    <div class="result-stats" id="resultStats"></div>
    <div class="result-actions">
      <button onclick="showHome()">返回首页</button>
      <button class="primary" onclick="retryWrong()">重做错题</button>
    </div>
    <div class="review-section" id="reviewSection"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3 id="modalTitle">提示</h3>
    <p id="modalMsg"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" id="modalConfirmBtn" onclick="modalConfirm()">确定</button>
    </div>
  </div>
</div>

,"answer":"A"},{"id":113,"question":"关于移动平均线 MA 基本应用原则错误的是（  ）。","options":{"A":"移动平均线从下降开始走平，金价从下向上穿过移动平均线时买入。","B":"移动平均线上升，金价也上升，同时两者距离不远，均线保持对金价的助涨作用，可以买入。","C":"移动平均线下降，金价也向下，金价与均线距离适当，均线保持其助跌作用。","D":"金价跌破移动平均线，经过迅速的下跌或者大幅下跌远离移动平均线，造成时间与空间上的不对应，将使金价继续下跌，应该卖出。"},"answer":"D"},{"id":114,"question":"18、2000-2020 年，不是影响黄金价格走势因素的是？（  ）","options":{"A":"美股整体呈现长牛","B":"美联储采取了超宽松的货币政策","C":"中国崛起","D":"美元持续走强"},"answer":"D"},{"id":115,"question":"BOLL 指标原理说法错误的是（  ）。","options":{"A":"布林通道的宽窄随着黄金价格波动幅度的大小而变化，而且黄金价格通道又具有变异性，它会随着黄金价格的变化而自动调整。","B":"一般而言，股票、黄金等投资标的物的运动总是围绕某一价值中枢在一定的范围内变动，布林线指标正是在上述条件的基础上，引进了“布林通道”的概念。","C":"BOLL 是利用“布林通道”来显示黄金的各种价位，当黄金价格波动很小，处于盘整时，布林通道就会变窄，这可能预示着黄金价格的波动处于暂时的平静期。","D":"当黄金价格波动超出狭窄的布林通道的上轨时，预示着黄金价格的涨势即将结束。"},"answer":"D"},{"id":116,"question":"21、（  ）是以最高价、最低价及收盘价为基本数据进行计算，得出的 K 值、 D 值和 J 值分别在指标的坐标上形成的一个点，连接无数个这样的点位，就形成一个完整的、能反映价格波动趋势的指标。","options":{"A":"相对强弱指标","B":"布林通道指标","C":"MACD 指标","D":"KDJ 指标"},"answer":"D"},{"id":117,"question":"22、利用黄金分割线判断反弹幅度以下错误的是（  ）。","options":{"A":"当金价从高位下跌过程中出现反弹，当这种反弹高度未到 0.382 线处，就又重新下跌，则意味着这种反弹是弱势反弹，金价未来的跌势可能会更加凶猛。","B":"当金价从高位下跌过程中出现反弹，当金价的反弹高度未到 0.5 线处，就重新下跌，则预示着这种反弹是下跌途中的中级抵抗，下跌行情尚未结束。","C":"当金价从高位下跌过程中出现反弹，当金价的反弹高度达到 0.618 线处时，说明金价的下跌趋势将趋缓，下跌行情也有可能转向横向整理的行情。","D":"当金价从高位下跌过程中出现反弹，当金价的反弹高度未到 0.5 线处，则预示着这种反弹是反转，下跌行情结束。"},"answer":"D"},{"id":118,"question":"23、利用黄金分割线判断黄金走势，上升行情中过程中回调至 0.618 这个黄金分割线以下的区域是（  ）。","options":{"A":"无压力区","B":"强力支撑区","C":"最后支撑区","D":"无支撑区"},"answer":"D"},{"id":119,"question":"24、（  ）是以道·琼斯的“平均成本概念”为理论基础，采用统计学中“移动平均”的原理，将一段时期内的黄金价格平均值连成曲线，用来显示黄金的历史","options":{"A":"波动情况，进而反映黄金价格未来发展趋势的技术分析方法。","B":"相对强弱指标","C":"移动平均线 MA","D":"MACD 指标"},"answer":"B"},{"id":120,"question":"25、（  ）是对统计关系进行定量描述的一种数学模型。该模型是研究一个变量","options":{"A":"（被解释变量）关于另一个（些）变量（解释变量）的具体依赖关系的计算方法和理论。","B":"回归模型","C":"随机波动模型","D":"灰色预测模型"},"answer":"A"},{"id":121,"question":"26、不是黄金投资组合策略需要考虑的角度是（  ）。","options":{"A":"持续过程和成本角度","B":"收益角度","C":"风险管理角度","D":"市场有效性的多角度"},"answer":"D"},{"id":122,"question":"27、关于支撑线 ）。","options":{"A":"股价不同时期的上下变动类似于自然界中波浪的上下起伏。","B":"每种周期中，价格都以近似的模式运行一一五个上升浪和三个下降浪，构成了八个浪的循环。","C":"向主要方向运行的波浪称为推动浪，它们都可以分成更小的五个小波浪，向相反方向进行的波浪称为调整浪，它们都可分成更小的三个小波浪。","D":"完成某个形态所经历的时间长短是最重要的。"},"answer":"D"},{"id":219,"question":"47、（  ）称为指数平滑异动平均线，它是一项利用短期（常用为 12 日）移动平均线与长期（常用为 26 日）移动平均线之间的聚合与分离状况，对买进、卖出时机做出研判的技术指标。","options":{"A":"相对强弱指标","B":"布林通道指标","C":"MACD 指标","D":"KDJ 指标"},"answer":"C"},{"id":220,"question":"49、随机指标 KDJ 下列使用原则错误的是（  ）。","options":{"A":"超买超卖区域判断：K 值在 80 以上，D 在 70 以上为超买，回档机率大；K 值在 20 以下，","B":"在 30 以下，为超卖，反弹机率大。","C":"在 30 以下金叉时，是买进的讯号；在 50 以上死叉时，是卖出讯号","D":"随机指数与黄金价格走势产生背驰时，一般为转势的讯号。"},"answer":"B"},{"id":221,"question":"50、利用黄金分割线判断黄金走势，上升行情中过程中回调至（  ），则意味着原来的金价上升行情已经结束。","options":{"A":"无压力区","B":"强力支撑区","C":"最后支撑区","D":"无支撑区"},"answer":"D"},{"id":222,"question":"51、当金价的低点比前一次的低点低，而指标的低点却比指标前一次的低点低，这就是（  ）。","options":{"A":"顶背离","B":"底背离","C":"卖出信号","D":"超买"},"answer":"B"},{"id":223,"question":"53、美国最重要的季度经济指标：（  ）","options":{"A":"采购经理人综合指数","B":"生产者物价指数(PPI)","C":"国内生产总值（GDP）","D":"信心指数"},"answer":"C"},{"id":224,"question":"54、美元指数的 6 种权重货币中最高的是（  ）","options":{"A":"英镑","B":"日元","C":"欧元","D":"加拿大元"},"answer":"C"},{"id":225,"question":"某银行在黄金柜台上，某顾客用瑞士法郎买入 130 克 99.90％纯金金条。国际金价为 1350.30 美元/盎司，此时 1 美元兑换 0.9560 瑞士法郎，该顾客需要支付多少瑞士法郎。（  ）","options":{"A":"5390","B":"5400","C":"5380","D":"5350"},"answer":"A"},{"id":226,"question":"以下哪种情况会导致黄金价格下跌（  ）","options":{"A":"黄金产量大幅增加","B":"金融危机爆发","C":"美联储宣布降息","D":"黄金需求减少"},"answer":"A"},{"id":227,"question":"57、通过下图，我们会发现：（  ）","options":{"A":"黄金与原油呈高度相关性","B":"黄金与美元呈负相关","C":"美元升值，黄金走高","D":"黄金可对冲大宗商品投资风险"},"answer":"B"},{"id":228,"question":"58、（  ）是衡量系统性风险的重要指标。","options":{"A":"贝塔系数","B":"阿尔法系数","C":"风险价格","D":"风险溢价"},"answer":"A"},{"id":229,"question":"（  ）预期可能会抬头。","options":{"A":"加息","B":"降息","C":"提高存款准备金率","D":"降低存款准备金率"},"answer":"A"},{"id":230,"question":"61、国际政治与黄金价格的传导机制描述错误的是（  ）。","options":{"A":"政局出现不稳定预期的经济体，在负债性质的信用货币政府清偿和资源配置能力下降时，黄金与货币比价关系就会调整。","B":"重要战略资源富集国家，政局或地缘国际关系出现不稳定预期，可能引发局部或整体的政治、经济或金融危机预期，形成黄金价格巨幅波动。","C":"重要文明间关系出现不协调的迹象，对应地区出现地缘政治不稳定预期。黄金价格一定会有所反应，这种反应可以看作对这些地缘政治事件的预警。","D":"经济发达国家重要资本市场出现调整现时引起游资结构调整的时候，对黄金价格产生短期影响。"},"answer":"D"},{"id":231,"question":"62、黄金的套利策略下列说法不正确的是：（  ）","options":{"A":"广义的套利在金融工程的定义中是指可以通过金融工具的组合建立一种投资组合，建立该组合时不需要成本，而且将来可以产生非负的收益","B":"投资组合中的金融工具可以是同种类的也可以是不同种类的","C":"实际中，套利意味着无风险的头寸，有更大的可能性会带来收益的头寸","D":"黄金套利交易通常指在两个或两个以上黄金交易市场拥有两个价格的情况下，在不同市场间以较低的价格买进，较高的价格卖出，从而获取无风险收益的市场行为。"},"answer":"C"},{"id":232,"question":"63、对于典型的炒单手法描述错误的是（  ）。","options":{"A":"即以趋势为原则，根据盘面的动态反映，抓取每天价格波动里的波纹式的极小差价，进行顺势短线而主动买卖的炒作行为。","B":"以趋势性炒作为主流，以逆趋势炒作为辅，主要依据盘面的动态反映，抓取每天价格波动里的波纹式涨跌里的极小差价，进行顺势主动买卖和被动抓取回调或反弹的炒作行为。","C":"一种鲜为人见的炒单手法，炒作时必须是同一市场同一品种。在涨势当中，选择强势月份合约买入，同时选择弱势月份合约等交易额卖出，以此实现获利的目的。做空则反之。","D":"顺着当前的趋势进行买卖。如果当前趋势涨就买入开仓，当前趋势跌就卖出"},"answer":"D"},{"id":233,"question":"64、套期保值功能概述错误的是（  ）。","options":{"A":"避免商品价格的千变万化导致成本上升或利润下降，可利用期货交易进行套期保值。","B":"为了生产经营者提供一条增加利润的渠道。","C":"期货市场风险转移的功能，为黄金市场参与者回避、转移和分散风险。","D":"期货市场上买进或卖出与现货市场上数量相等但交易方向相反的商品，使两"},"answer":"B"},{"id":234,"question":"65、（  ）是利用两种不同的、但相关联商品之间的价差进行交易。这两种商品之间具有相互替代性或受同一供求因素制约。","options":{"A":"跨期套利","B":"跨市套利","C":"跨商品套利","D":"信息不对称套利 266、交易策略对于市场参与者来说具有重要的意义，其主要表现作用错误的是"},"answer":"C"},{"id":235,"question":"67、（  ）是指在买进某一交割月份期货商品合约的同时，卖出另一交割月份的同类期货商品合约。","options":{"A":"跨月份套利交易","B":"跨商品套利交易","C":"跨市场套利交易","D":"期现套利交易"},"answer":"A"},{"id":236,"question":"1000 克黄金进行加工，2010 年 1 月国内现货金价为 245 元/克左右，原料采购是该企业的重要成本支出，企业认为该价格非常理想，为了锁定采购成本，企业选择在上海期货交易所黄金期货上做买入套期保值操作，此时期货价格在 247 元/克，企业在此价位买入 1000 克期货合约，到了 4 月份，企业按照生产计划在现货市场上采购了 1000 克黄金，价格为 260 元，同时在期货市场上以 262 元的价格卖出期货合约对冲了结。该企业本次套期保值盈损结果为？（  ） A、锁定价格成功，未产生盈亏","options":{"A":"锁定价格失败，多付出 25 元/克","B":"锁定价格成功，同时额外产生 15 元/克盈利","C":"锁定价格失败，同时额外产生 10 元/克亏损","D":"如果即时伦敦金报价为 1678USD/oz，美元对人民币的无本金交割远期"},"answer":"A"},{"id":237,"question":"合约（NDF）为 6.7506 人民币元/美元，则人民币金价为（  ）。","options":{"A":"385.60 元/g","B":"364.19 元/g","C":"370.50 元/g","D":"353.20 元/g"},"answer":"B"},{"id":238,"question":"根据各国和地区的法律规定，各国和地区投资咨询的业务范围各不相同，以下不属 on":"91、关于黄金生产商做卖出套期保值的基本原则说法错误的是（  ）。","options":{"A":"选择的期货商品必须和套期保值者将在现货市场中买进或卖出的现货商品在种类上相同。","B":"所选用的期货合约上所载的商品数量与交易者将要在现货市场上买进或卖出的商品数量大致相等。","C":"所选用的期货合约的交割月份最好与交易者将来在现货市场上实际买进或卖出现货商品的时间相同或相近。","D":"套期保值者必须同时或相近时间内在现货市场上和期货市场上采取相反的买卖行动，即进行反向操作。"},"answer":"B"},{"id":333,"question":"92、如何理解让“让利润持续发展”这句话：（  ）","options":{"A":"利润总是能够自己照顾自己，而亏损永远不会自动了结。","B":"一旦有了利润，就可以毫无顾忌的持有。","C":"归根结底还是选择在何时判断加仓时机的问题。","D":"放平和心态"},"answer":"A"},{"id":334,"question":"93、以下关于套利说明不正确的是（  ）","options":{"A":"套利者大量入市，使黄金期货价格向合理区间运行","B":"当期货价格出现较大偏差时，就会为套利资金的进场创造了条件","C":"往往新品种会出现大量套利者，原因在于市场各方参与力量对价格的分析与期盼存在分歧","D":"当市场交易足够活跃，则套利空间就不复存在了"},"answer":"D"},{"id":335,"question":"国际上主要的商品都是以美元计价，那么所对应的商品价格应该是（  ）。","options":{"A":"下跌","B":"上涨","C":"无影响","D":"横向波动"},"answer":"A"},{"id":336,"question":"96、客户以 250 元/克买入 100 克账户人民币黄金，一个月后以 270 元/克卖出 50 克，账户实际盈利或亏损多少？（  ）","options":{"A":"盈利 3000 元","B":"盈利 1000 元","C":"亏损 3000 元","D":"亏损 1000 元"},"answer":"B"},{"id":337,"question":"格平仓了结，请计算该投资者的盈亏情况（  ）。（不考虑交易手续费）","options":{"A":"盈利 99445 元","B":"盈利 99556 元","C":"盈利 89,443.5 元","D":"盈利 89,554.8 元"},"answer":"A"},{"id":338,"question":"98、黄金投资的低风险组合说法错误的是（  ）。","options":{"A":"在黄金价格处于上升趋势时，可以选择持有大比例的现金、持有一定比例的实物黄金和一定比例的黄金矿山类股票、持有小于总额的 5%-10%的多头黄金衍生品头寸。","B":"在黄金价格有下降趋势时，可以选择持有很大比例的现金或者是实物黄金、持有小比例的黄金矿山类股票、持有小于总额 5%的空头黄金衍生品头寸。","C":"在黄金价格处于上升趋势时，可以选择持有大比例的现金、持有一定比例的实物黄金和一定比例的黄金矿山类股票、持有小于总额的 20%-40%的多头黄金衍生品头寸。","D":"低风险组合比较适合刚刚参与金市且风险承受能力较小的散户投资者，以及风险规避意愿强烈的国有企业。"},"answer":"C"},{"id":339,"question":"选择价值相对稳定的其它通货，其中（  ）是备选的重要对象。","options":{"A":"黄金","B":"原油","C":"国债","D":"房产"},"answer":"A"},{"id":340,"question":"00、如果大家普遍对经济前景看好，则大批资金为追逐高利流向股市，股市投资热烈，金价（  ）。","options":{"A":"下降","B":"震荡","C":"上涨","D":"无波动"},"answer":"A"},{"id":341,"question":"（  ）年，世界上第一支黄金 ETF 在悉尼上市，标志着更为便捷的黄金投资途径的诞生。","options":{"A":"2000","B":"2001","C":"2002","D":"2003"},"answer":"D"},{"id":342,"question":"自从黄金退出国际货币体系以后，信用货币成为国际货币体系的本位制度, 那么信用货币是以（  ）做担保的。","options":{"A":"央行信用","B":"黄金","C":"货币发行政府信用","D":"美国政府"},"ans 。","options":{"A":"价格上升，处于牛市","B":"价格上升，处于熊市","C":"价格下降，处于牛市","D":"价格下降，处于熊市"},"answer":"D"},{"id":356,"question":"17、从国际金融形势的角度来看，以下不是影响金价的主要因素是？（  ）","options":{"A":"货币供应量","B":"利率水平","C":"物价水平","D":"汇率水平"},"answer":"C"},{"id":357,"question":"18、美国“9.11”事件发生后，美国股市休市，全球股市普遍大跌，黄金则大幅上涨，有关“9.11”事件对市场的影响，下列说法正确的有（  ）。","options":{"A":"恐怖袭击事件，引起市场恐慌，对黄金市场带来利好","B":"对信用货币稳定性冲击越大的地缘政治事件，对市场影响越大","C":"信用货币稳定性越强的地区，遭受地缘政治事件冲击，对当地金价影响越大","D":"信用货币稳定性越强的地区，遭受地缘政治事件冲击，对当地金价影响越小"},"answer":"D"},{"id":358,"question":"19、对错综复杂的国际地缘政治事件进行梳理，以下线索分析国际政治经济形势错误的是（  ）。","options":{"A":"现实主义国家权力观的视角。","B":"国际政治经济发展联动效应的视角。","C":"文明差异和基础经济资源争夺的视角。","D":"陆地板块争夺的视角。"},"answer":"D"},{"id":359,"question":"21、黄金价格与美国经济的关系密切，黄金价格和黄金投资离不开对美国政治经济形势的深入分析。以下原因错误的是（  ）。","options":{"A":"黄金用美元标价。","B":"美国是最大的经济资源消耗国。","C":"国际投资在很大程度上是在美国本土上的金融投资，美国资本市场是世界上最大的投资市场之一。","D":"美国是全球最大的黄金消费国。"},"answer":"D"},{"id":360,"question":"422、关于黄金现货价格与黄金期货价格下列说法正确的是：（  ）","options":{"A":"黄金现货价格与黄金期货之间的这种变动特性就是黄金期现对冲交易能够实现套期保值的原理。","B":"黄金现货价格与黄金期货价格变动不大，因此可以提供不错的套期保值机会。","C":"虽然黄金期货市场受各种因素的影响有时会偏离现货市场，但黄金现货价格最终仍会回归期货价格","D":"黄金期货价格是确定黄金现货价格的基础"},"answer":"A"},{"id":361,"question":"23、对于套期保值效果的评判标准以下说法不正确的是（  ）","options":{"A":"黄金期货套期保值效果的评价与不同的交易主体、交易目的密切相关","B":"为锁定价格而参与的交易者和为获利而参与的交易者，两者在交易方式、交易手段上没有太大的区别，但是在投资理念、操作策略以及实际效果上会有很大的差别","C":"黄金期货合约的套期保值交易中其盈利情况为套期保值的实际效果","D":"套期保值应以锁定价格、规避风险为目的作为评判标准"},"answer":"C"},{"id":362,"question":"24、对于短线交易策略，下列属于错误短线交易信念的是（  ）。","options":{"A":"永远按照交易信号操作和顺势交易","B":"市场运动是测不准的，不要强求执行开仓","C":"资金管理和跟踪止损及止赢","D":"一旦亏损可以耐心等待变成长线交易策略"},"answer":"D"},{"id":363,"question":"425、基差与套期保值效果的对应关系说法错误的是（  ）。","options":{"A":"不仅将现货风险全额对冲，而且还有盈利。","B":"现货风险只得到部分对冲，仍有亏损","C":"不仅没有对冲现货风险，反而新增了期货风险。","D":"当基差趋向于负向变化时，对卖出套期保值者有利。"},"answer":"D"},{"id":364,"question":"26、（  ）是指利用股指期货市场存在的不合理价格，同时参与股指期货与股票现货市场交易，或者同时进行不同期限、不同（但相近）类别股票指数合约交易，以赚取差价的行为。","options":{"A":"股指期货套利","B":"商品期货套利","C":"统计套利","D":"期权套利"},"answer":"A"},{"id":365,"question":"COMEX 黄金期货每手交易单位为（  ）","options":{"A":"1000 克","B":"10 盎司","C":"100 克","D":"100 盎司"},"answer":"D"},{"id":366,"question":"（  ）包括现货和期货价格。这两种价格既有联系，又有区别。这两种价格都受供需等各种因素的制约和干扰，变化大，而且价格确定机制十分复杂。","options":{"A":"生产价格","B":"市场价格","C":"官方价格","D":"抵押价格"},"answer":"B"},{"id":367,"question":"关于基差，下列说法不正确的有（  ）。","options":{"A":"采用买进套期保值策略，当基差走弱时，套期保值可以赚钱","B":"采用买进套期保值策略，当基差走强时，套期保值可以赚钱","C":"采用卖出套期保值策略，当基差走弱时，套期保值出现亏损","D":"采用卖出套期保值策略，当基差走强时，套期保值可以赚钱"},"answer":"B"},{"id":368,"question":"该黄金生产商套期保值交易结果为？（  ）","options":{"A":"现货市场亏损 40 美元/盎司，期货市场盈利 50 美元/盎司，成功规避风险，且有部分盈利。","B":"现货市场亏损 10 美元/盎司，期货市场盈利 60 美元/盎司，成功规避风险，且有丰厚盈利。","C":"现货市场盈利 40 美元/盎司，期货市场亏损 50 美元/盎司，未成功规避风险，且亏损 10 美元/盎司。","D":"现货市场亏损 40 美元/盎司，期货市场盈利 30 美元/盎司，未成功规避风险，且亏损 10 美元/盎司。"},"answer":"A"},{"id":369,"question":"31、黄金套期保值是在黄金期、现货市场进行一系列的对冲交易，黄金套期保值不能起到（  ）作用。","options":{"A":"锁定价格","B":"完全规避市场波动风险","C":"获得投资收益","D":"增加市场交易量"},"answer":"B"},{"id":370,"question":"合约（NDF）为 6.8506 人民币元/美元，则人民币金价为（  ）。","options":{"A":"388.64 元/g","B":"375.80 元/g","C":"380.23 元/g","D":"385.44 元/g"},"answer":"D"},{"id":371,"question":"纯度为 99.9%的黄金售价为 1500USD/OZ，那么相应的纯度为 99.5% 的黄金售价应为（  ）。","options":{"A":"1493.99 USD/OZ","B":"1480.60 USD/OZ","C":"1501.36 USD/OZ","D":"1502.36 USD/OZ"},"answer":"A"},{"id":372,"question":"某银行在黄金柜台上，某顾客用瑞士法郎买入 100 克 99.90％纯金金条。国际金价为 350.30 美元/盎司，此时 1 美元兑换 1.7590 瑞士法郎，该顾客需要支付多少瑞士法郎。（  ）","options":{"A":"1617","B":"1786","C":"1978","D":"1530"},"answer":"C"},{"id":373,"question":"某客户用美元从银行购进 50 条 1 千克的 99.95％金条，交收地在伦敦。国际金价为 1450 美元/盎司，1000 克金条每盎司造价 1.10 美元，每盎司的运保费为 1.20 美元。该客户需要支付多少美元。（  ）","options":{"A":"2333460.30","B":"2333650.75","C":"2333459.26","D":"2333750.60"},"answer":"C"},{"id":374,"question":"436、黄金投资咨询机构及其人员，其主要业务内容不包括：（  ）","options":{"A":"向客户提供尽可能充分、准确、迅速的市场信息","B":"向客户提供有根据的、深入的、尽可能准确的市场发展情况分析与预测","C":"为客户的投资决策提供合理的建议","D":"接受客户委托，替客户进行投资"},"answer":"D"},{"id":375,"question":"38、 一个新品种上市之初，之所以存在套利资金，以下说法不正确的是（  ）","options":{"A":"市场各方参与力量对价格的分析与期盼存在分歧，从而会导致期货价格出现较大偏差","B":"市场各机构未参与到市场，导致市场流动性缺失","C":"人们对于市场风险的认知不足，导致操作上很容易出现失误","D":"定价不合理" options":{"A":"636800 美元","B":"692520 美元","C":"646800 美元","D":"672520 美元"},"answer":"B"},{"id":440,"question":"在黄金现货市场上，标准的黄金报价往往与成色、规格、交货时间、交货地点、（  ）等联系在一起。","options":{"A":"成交量","B":"交易地区","C":"货币种类","D":"运输"},"answer":"C"},{"id":441,"question":"21、COMEX 黄金期货价格和美元指数在大多数情况下的关系为（  ）。","options":{"A":"正相关","B":"不相关","C":"负相关","D":"同涨同跌"},"answer":"C"},{"id":442,"question":"22、“货币天然不是金银，但金银天然就是货币”这句话体现了黄金的什么属性（  ）。","options":{"A":"商品属性","B":"自然属性","C":"货币属性","D":"金融属性"},"answer":"C"},{"id":443,"question":"23、任何一次的战争或政治局势的动荡往往都会促涨金价，而突发性的地缘政治动荡事件往往会让金价短期内（  ）。","options":{"A":"低迷","B":"大幅飚升","C":"震荡","D":"大幅下跌"},"answer":"B"},{"id":444,"question":"月金价表现也比较疲软，这表示黄金中期价格具有（  ）特征。","options":{"A":"季节性特征","B":"趋势性特征","C":"微观市场特征","D":"连续性特征"},"answer":"A"},{"id":445,"question":"25、利率与黄金价格传导机制描述错误的（  ）。","options":{"A":"当市场利率走高时，资金往往会流入货币市场和债券市场，黄金价格就会走低。","B":"在利率偏低时，衡量之下，投资黄金会有一定的益处。","C":"在 2001 年到 2003 年期间，实际利率低于 1%水平，这几年黄金价格是熊市的开端。","D":"扣除通胀后的实际利率是持有黄金的机会成本。当实际利率为负的时候，人们更愿意持有黄金。"},"answer":"C"},{"id":446,"question":"27、1975 年，美国政府取消黄金限制，允许私人买卖黄金，（  ）也推出了黄金期货合约的交易，由于美国经济霸主地位，黄金期货交易量在几年内迅速扩大。","options":{"A":"纽约期货交易所","B":"纽约商品交易所","C":"芝加哥商品交易所","D":"洲际交易所"},"answer":"B"},{"id":447,"question":"28、国际金价在 20 世纪 70 年代末触及 800 美元/盎司的高位后，于 1980 年开始下跌，到 1885 年金价下跌至 300 美元/盎司左右，至 1999 年国际金价下跌至 251 美元/盎司，创出金二十年最低价。那么，造成黄金近二十年熊市的原因不正确的是（  ）。","options":{"A":"美国紧缩的货币政策","B":"美联储持续卖出黄金","C":"沙特增产，石油价格崩溃","D":"前苏联解体，削弱了黄金作为投资者避风港的作用"},"answer":"B"},{"id":448,"question":"下列时间段，国际黄金市场处于熊市的是（  ）。","options":{"A":"1940-1970 年","B":"1970-1980 年","C":"1980-2000 年","D":"2000-2012 年"},"answer":"C"},{"id":449,"question":"（  ）假说是技术面分析最基本、最核心的因素","options":{"A":"价格沿趋势移动","B":"价格围绕价值波动","C":"市场行为涵盖一切信息","D":"历史会重演"},"answer":"A"},{"id":450,"question":"根据波浪理论，牛市中的（  ）是跌幅最大、持续时间最久的一浪","options":{"A":"A 浪","B":"2 浪","C":"C 浪","D":"4 浪"},"answer":"C"},{"id":451,"question":"在应用移动平均线时，下列操作或说法错误的是（  ）","options":{"A":"当价格向上突破均线后，必然将逐渐回归均线","B":"均线会起到支撑线和压力线的作用","C":"均线的变化过于迟缓，往往会落后于趋势","D":"在盘整期，均线容易发 "B":"限价指令","C":"停价指令","D":"限时指令"},"answer":"A"},{"id":54,"question":"（  ）这是一种有条件指令，只有市场价格达到指令价格时才被执行，一般买价指令只有在市场价格低于一定水平时才执行，而卖价指令只有在市场价格高于一定水平才执行。如果市场价格没有到达限度价格水平，该指令就不能被执行。","options":{"A":"市价指令","B":"限价指令","C":"停价指令","D":"停止限价指令"},"answer":"B"},{"id":55,"question":"（  ）是用来同时建立多头仓位和空头仓位。如对一定数量黄金建立多头仓位和空头仓位，只是期货合约的到期日不同。","options":{"A":"套利指令","B":"限价指令","C":"停价指令","D":"停止限价指令"},"answer":"A"},{"id":56,"question":"COMEX黄金期货价格和美元指数在大多数情况下的关系为（  ）。","options":{"A":"正相关","B":"不相关","C":"负相关","D":"同涨同跌 62、现货价格和期货价格所受的影响因素类似，因此两者的变化方向和幅度都基本上是一致的。但由于市场走势的收敛性，理论上到了交割期，期货价格和交易的现货价格（C）。"},"answer":"C"},{"id":57,"question":"（  ）是全球最大的黄金消费国。","options":{"A":"中国","B":"美国","C":"印度","D":"德国"},"answer":"A"},{"id":58,"question":"不属于上海黄金期货和黄金AU(T+D)相似之处的是（  ）。","options":{"A":"两者既可做多，也可做空，交易方式比较灵活。","B":"都是保证金交易，杠杆式交易可以以小博大，但同时也增大了风险。","C":"交割标的一样，基准交割品种为标准重量3千克、成色不低于99.95%的金锭，标准重量1千克、成色不低于99.99%的金锭可替代交割。","D":"个人投资者均可以在上海黄金期货和黄金AU(T+D)进行实物交割。"},"answer":"D"},{"id":59,"question":"黄金价格的（  ）就是对影响黄金价格走势的长期、宏观因素，比如黄金的供需、美元价格走势、石油价格、国际经济等影响因素来分析黄金价格的变动趋势。","options":{"A":"财务分析","B":"基本分析","C":"技术分析","D":"行业分析"},"answer":"B"},{"id":60,"question":"黄金价格的（  ）就是借助心理学、统计学等学科的研究方法和手段，通过对黄金价格、交易量等历史数据波动的研究，对黄金在短期内未来价格的趋势进行预测，对黄金投资者的投资行为提出建议。","options":{"A":"财务分析","B":"基本分析","C":"技术分析","D":"行业分析"},"answer":"C"},{"id":61,"question":"根据各个影响事件的作用机制分析，不属于影响黄金价格机制的是（  ）。","options":{"A":"国际地缘政治","B":"国际经济","C":"国际金融和国际投资","D":"国际贸易"},"answer":"D"},{"id":62,"question":"当世界经济平稳发展时，黄金价格影响的主导机制的是（  ）。","options":{"A":"货币属性","B":"实物黄金的供需","C":"金融属性","D":"国家的黄金储备"},"answer":"B"},{"id":63,"question":"黄金货币属性成为影响黄金价格的主导因素时，黄金商品属性对黄金价格形成机制的影响就会（  ）。","options":{"A":"被强化","B":"被弱化","C":"消失","D":"更加重要 70、黄金货币属性与商品属性转换机制中，黄金（A）显现与国际地缘政治形式发展密切相关。"},"answer":"B"},{"id":64,"question":"（  ）是影响黄金价格的核心因素。","options":{"A":"国际地缘政治","B":"国际经济形势","C":"国际金融形势","D":"国际投资市场游资结构调整"},"answer":"A"},{"id":65,"question":"（  ）是指重要经济体的金融发展状况，包括货币发行量、金融资产分布结构、资本市场、货币汇率、利率和投资市场等一系列金融市场和金融观测变量的发展态势。","options":{"A":"国际经济形势","B":"国际地缘政治","C":"国际金融形势","D":"国际投资市场游资结构调整"},"answer":"C"},{"id":66,"question":"当政治、经济和金融因素触发重要国家金融危机的时候，引发黄金的货币属性显现，从而黄金价格将会（  ）。","options":{"A":"中长期上涨","B":"短期上涨","C":"中长期下跌","D":"剧烈震荡"},"answer":"A"},{"id":67,"question":"（  ）是指分布于国际金融投资市场——货币、资本、期货（商品）和黄金及衍生金融投资工具市场间游资分布结构的存量和流量发生较大规模的调整。","options":{"A":"国际经济形势","B":"国际地缘政治","C":"国际金融形势","D":"国际投资市场游资结构调整"},"answer":"D"},{"id":68,"question":"在金融投资市场的结构中，通常来说，大规模游资流动会引起游资流出市 场，引发投资工具价格（  ），而游资流入市场，投资工具价格（）。","options":{"A":"上调、下调","B":"下调、上调","C":"中长期上调、中长期下调","D":"中长期下调、中长期上调"},"answer":"B"},{"id":69,"question":"根据黄金价格影响因素层次的分析，影响黄金价格的核心因素是（  ）。","options":{"A":"国际经济形势","B":"国际地缘政治","C":"国际金融形势","D":"国际投资市场游资结构调整"},"answer":"B"},{"id":70,"question":"货币的载体是（  ）。","options":{"A":"国家信用","B":"国债","C":"黄金","D":"诚信 79、货币超经济发行的影响，描述错误的是（B）。"},"answer":"A"},{"id":71,"question":"货币发行国政府的信用受到质疑，该国的货币持有人就会抛售该种货币， 选择价值相对稳定的其它通货，其中（  ）是备选的重要对象。","options":{"A":"黄金","B":"原油","C":"国债","D":"房产"},"answer":"A"},{"id":72,"question":"（  ）是通过中央计划部门的指令实现社会经济资源的流转配置的一种经济","options":{"A":"市场经济","B":"计划经济","C":"社会市场经济","D":"自由市场经济"},"answer":"B"},{"id":73,"question":"（  ）运行模式中，起主要作用的是中央计划指令，货币在这种经济模式中不拥有完全的货币职能。","options":{"A":"市场经济","B":"自由市场经济","C":"社会市场经济","D":"计划经济"},"answer":"D"},{"id":74,"question":"全球或地区政治格局的形成和发展受地理条件的影响甚至制约是（  ）的基本观点。","options":{"A":"地缘政治学","B":"心脏地带学说","C":"边缘地区学说","D":"经济地理学"},"answer":"A"},{"id":75,"question":"（  ）根据各种地理要素和政治格局的地域形势，分析、预测世界或地区范围的战略形势和有关国家的政治行为。","options":{"A":"地缘政治学","B":"心脏地带学说","C":"边缘地区学说","D":"经济地理学"},"answer":"A"},{"id":76,"question":"资源配置和经济关系全球化描述错误的是（  ）。","options":{"A":"全球工业化的经济结构产生了对重要基础经济资源的依赖。","B":"社会分工与社会结构分化产生了对基础经济资源的需求刚性。","C":"工业化国家产生了对基础经济资源境外配置的依赖。","D":"资源配置和经济关系产生分化。"},"answer":"D"},{"id":77,"question":"重要国家政局或地缘关系出现不稳定预期的时候，影响黄金价格机制的主要 因素是（  ）。","options":{"A":"国际经济形势","B":"国际地缘政治","C":"国际金融形势","D":"国际投资市场游资结构调整 87、对错综复杂的国际地缘政治事件进行梳理，以下线索分析国际政治经济形势错误的是（D）。"},"answer":"B"},{"id":78,"question":"政局出现不稳定预期的经济体，其政体发行信用货币形成的对货币持有人的负债，存在承诺危机。在负债性质的信用货币政府清偿和资源配置能力下降时，黄金价格的表现为（  ）。","options":{"A":"剧烈震荡","B":"下跌","C":"上涨","D":"波动收窄"},"answer":"C"},{"id":79,"question":"国际政治与黄金价格的传导机制描述错误的是（  ）。","options":{"A":"政局出现不稳定预期的经济体，在负债性质的信用货币政府清偿和资源配置能力下降时，黄金与货币比价关系就会调整。","B":"重要战略资源富集国家，政局或地缘国际关系出现不稳定预期，可能引发局部或整体的政治、经济或金融危机预期，形成黄金价格巨幅波动。","C":"重要文明间关系出现不协调的迹象，对应地区出现地缘政治不稳定预期。黄金价格一定会有所反应，这种反应可以看作对这些地缘政治事件的预警。","D":"经济发达国家重要资本市场出现调整现时引起游资结构调整的时候，对黄金价格产生短期影响。"},"answer":"D"},{"id":80,"question":"国际经济形势稳定和发展良好，实体经济和虚拟经济领域充满投资机会，短期资本机会成本较高，刺激短期资本流向收益较高的实体经济投资或虚拟经济领域的证券市场投资，流入黄金市场的短期资本流量下降，黄金价格的趋势为（  ）。","options":{"A":"下降趋势","B":"上升趋势","C":"窄幅波动","D":"横盘震荡 91、国际经济形势不稳定或出现危机预期，实体经济和虚拟经济领域投资机会减少，短期资本机会成本下降，刺激短期资本流从实体经济投资或虚拟经济领域的证券市场分流，流入黄金市场的短期资本流量增加，黄金价格的趋势为（B）。"},"answer":"A"},{"id":81,"question":"黄金价格与美国经济的关系密切，黄金价格和黄金投资离不开对美国政治经济形势的深入分析。以下原因错误的是（  ）。","options":{"A":"黄金用美元标价。","B":"美国是最大的经济资源消耗国。","C":"国际投资在很大程度上是在美国本土上的金融投资，美国资本市场是世界上最大的投资市场之一。","D":"美国是全球最大的黄金消费国。"},"answer":"D"},{"id":82,"question":"如果利率水平和货币发行量稳定，黄金的（  ）成为影响黄金价格的主导因素。","options":{"A":"商品属性","B":"货币属性","C":"金融属性","D":"投资属性"},"answer":"A"},{"id":83,"question":"如果利率水平和货币供应量稳定，美国的经济资源配置循环是稳定的。美国的资本市场成为吸纳游资的场所，金价的走势为（  ）。","options":{"A":"下降趋势","B":"上升趋势","C":"横盘震荡","D":"窄幅波动"},"answer":"A"},{"id":84,"question":"国际经济形势对金价的作用机制与地缘政治对金价的作用机制相互影响，若 地缘政治形势稳定时，（  ）对金价走势起决定性作用。","options":{"A":"国际经济形势","B":"国际地缘政治","C":"国际金融形势","D":"国际投资市场游资结构调整 96、当美国出现经济危机的时候，美国的物价上涨，货币供应量出现波动，黄金的货币属性成为影响黄金价格的主导因素。资本市场吸纳游资能力下降，金价的走势为（B）。"},"answer":"A"},{"id":85,"question":"金融自由化是指20世纪80年代初，以美国为主体的西方国家逐步放松金融管制，推动金融创新。不属于其具体表现的是（  ）。","options":{"A":"价格和市场自由化","B":"业务自由化","C":"资本流动自由化","D":"贸易自由化"},"answer":"D"},{"id":86,"question":"（  ）是指取消利率、汇率的限制，使金融投资工具价格机制取向市场化。同时，放宽本国资本和金融机构进入外国市场的限制。","options":{"A":"价格自由化","B":"业务自由化","C":"市场自由化D、资本流动自由化"},"answer":"A"},{"id":87,"question":"（  ）是指放松各类金融机构进入金融市场的限制，完善金融市场的融资工具和技术。","options":{"A":"价格自由化","B":"业务自由化","C":"市场自由化D、资本流动自由化"},"answer":"C"},{"id":88,"question":"（  ）是指放宽外国金融机构进入本国市场的限制。","options":{"A":"价格自由化","B":"业务自由化","C":"市场自由化","D":"资本流动自由化"},"answer":"D"},{"id":89,"question":"在经济扩张时，总需求过大，政府采取（  ）。","options":{"A":"扩张型货币政策","B":"紧缩型货币政策","C":"维持货币政策不变D、弹性货币政策"},"answer":"B"},{"id":90,"question":"下列关于货币政策调整说法错误的是（  ）。","options":{"A":"货币政策的运作分为紧缩型货币政策和扩张型货币政策。","B":"在经济衰退时，总需求不足，政府采取扩张型货币政策。","C":"在经济扩张时，总需求过大，政府采取紧缩型货币政策。","D":"货币政策调整为紧缩型货币时资金的借入成本下降。"},"answer":"D"},{"id":91,"question":"美国金融市场发展良好的时候，资本不断流人，黄金的价格主要受到其 （  ）影响，从而会出现走弱的趋势。","options":{"A":"商品属性","B":"货币属性","C":"投资属性","D":"金融属性"},"answer":"A"},{"id":92,"question":"非美全球金融形势发展稳定，资本市场发展良好，黄金价格（  ）。","options":{"A":"震荡","B":"趋于强势","C":"趋于弱势","D":"下跌"},"answer":"B"},{"id":93,"question":"文明冲突和美国战略反恐推动了国际政治层面的金融机制显现，国际政治层面的黄金价格机制出现，推动黄金价格（  ）。","options":{"A":"上涨","B":"弱势波动","C":"震荡","D":"下跌"},"answer":"A"},{"id":94,"question":"欧盟宪法和欧盟内部的不稳定因素出现，支持了美元对其他主要货币汇率的强势，但是美元汇率与黄金价格的（  ）。","options":{"A":"关系弱化","B":"关系强化","C":"负相关","D":"正相关"},"answer":"A"},{"id":95,"question":"美国资本市场下调的压力及下调预期，强化了短期资本向期货（商品）和黄金市场分流的趋势，黄金价格（  ）。","options":{"A":"剧烈震荡B、下跌趋势显现","C":"弱势显现","D":"上涨趋势显现"},"answer":"D"},{"id":96,"question":"重要资源性原材料价格持续大幅上升，形成了通货膨胀显现的预期，黄金的金融风险防范机制传导形成黄金价格（  ）。","options":{"A":"黄金期货","B":"黄金期权","C":"黄金ETF","D":"黄金借贷"},"answer":"C"},{"id":97,"question":"世界黄金市场衍生工具，非标准化场外交易产品是指标准化程度较低的交 易产品，交易场所也可以涵盖场内和场外，主要品种不包括（  ）。","options":{"A":"黄金借贷","B":"黄金期权","C":"黄金账户","D":"黄金远期和掉期"},"answer":"B"},{"id":98,"question":"不属于技术分析理论基础假设的是（  ）。","options":{"A":"市场行为包括一切信息。","B":"价格沿趋势波动，保持趋势、历史会重复。","C":"人们有重复成功经验的心理趋向。","D":"价格围绕价值波动。"},"answer":"D"},{"id":99,"question":"对于技术分析优点描述错误的是（  ）。","options":{"A":"技术分析具备全面、直接、准确、可操作性强、适用范围广等显著特点。","B":"技术分析进行交易的见效快，获得利益的周期短。","C":"技术分析对市场的反应比较直接，分析的结果也更接近实际市场的局部现象。","D":"技术分析能够比较全面地把握价格的基本走势。"},"answer":"D"},{"id":100,"question":"不属于技术分析的基本要素的是（  ）。","options":{"A":"价格","B":"成交量","C":"时间和空间","D":"形态"},"answer":"D"},{"id":101,"question":"（  ）是根据黄金成交价、交易量的历史资料，通过建立一个数学模型，给出数学上的计算公式，得到一个体现黄金市场的某个方面内在实质的指标值。","options":{"A":"指标类预测技术","B":"切线类预测技术","C":"形态类预测技术","D":"K线类预测技术"},"answer":"A"},{"id":102,"question":"（  ）是按一定方法和原则，在根据黄 C":"6日RSI向上突破12日RSI，买进信号；反之，卖出信号。","D":"当RSI值突破80，买进信号。"},"answer":"D"},{"id":115,"question":"BOLL指标原理说法错误的是（  ）。","options":{"A":"布林通道的宽窄随着黄金价格波动幅度的大小而变化，而且黄金价格通道又具有变异性，它会随着黄金价格的变化而自动调整。","B":"一般而言，股票、黄金等投资标的物的运动总是围绕某一价值中枢在一定的范围内变动，布林线指标正是在上述条件的基础上，引进了“布林通道”的概念。 C、BOLL是利用“布林通道”来显示黄金的各种价位，当黄金价格波动很小，处于盘整时，布林通道就会变窄，这可能预示着黄金价格的波动处于暂时的平静期。","D":"当黄金价格波动超出狭窄的布林通道的上轨时，预示着黄金价格的涨势即将结束。"},"answer":"D"},{"id":116,"question":"BOLL指标的使用原则错误的是（  ）。","options":{"A":"布林通道紧紧收窄时，是行情将会选择突破方向的信号。但此时不要盲目入市，而是等到布林通道放大，趋势确定时再入场操作。","B":"当布林通道上轨继续放大，而下轨却开始收敛，或者是相反的情况，都是行情转势的先兆。","C":"当金价突破整理格局；开始进行趋势行情时，布林线指标两条界限的距离会扩张。","D":"布林通道紧紧收窄时，是最佳入场机会。如果等到布林通道放大，趋势确定时再入场操作机会就流失了。"},"answer":"D"},{"id":117,"question":"（  ）称为指数平滑异动平均线，它是一项利用短期（常用为12日）移动平均线与长期（常用为26日）移动平均线之间的聚合与分离状况，对买进、卖出时机做出研判的技术指标。","options":{"A":"相对强弱指标","B":"布林通道指标","C":"MACD指标","D":"KDJ指标 136、MACD指标所应当遵循的基本原则下列错误的是（B）。"},"answer":"C"},{"id":118,"question":"（  ）是以最高价、最低价及收盘价为基本数据进行计算，得出的K值、D值和J值分别在指标的坐标上形成的一个点，连接无数个这样的点位，就形成一个完整的、能反映价格波动趋势的指标。","options":{"A":"相对强弱指标","B":"布林通道指标","C":"MACD指标","D":"KDJ指标"},"answer":"D"},{"id":119,"question":"随机指标KDJ下列使用原则错误的是（  ）。","options":{"A":"超买超卖区域判断：K值在80以上，D在70以上为超买，回档机率大；K值在20以下，D在30以下，为超卖，反弹机率大。","B":"在30以下金叉时，是买进的讯号；在50以上死叉时，是卖出讯号","C":"随机指数与黄金价格走势产生背驰时，一般为转势的讯号。","D":"K线和D线上升或下跌的速度减弱，通常都表示短期内会转势；K线在上升或"},"answer":"B"},{"id":120,"question":"利用黄金分割线判断回调幅度以下错误的是（  ）。","options":{"A":"一轮真正的上升行情中，会有几次级别比较大的回调整理过程，这种回调整理的第一目标位，一般是前段上升行情高度的0.382线附近。","B":"一轮真正的上升行情中，会有几次级别比较大的回调整理过程，第二和第三目标位则是前段上升行情高度的0.5线和0.618线附近。","C":"如果金价回调到0.618线下方，则表明金价的强势上升行情依旧。","D":"金价有效向下击穿0.618线，则说明这段上升行情即将结束，金价的上升趋势将转为下降趋势或水平运动趋势。"},"answer":"C"},{"id":121,"question":"利用黄金分割线判断反弹幅度以下错误的是（  ）。","options":{"A":"当金价从高位下跌过程中出现反弹，当这种反弹高度未到0.382线处，就又重新下跌，则意味着这种反弹是弱势反弹，金价未来的跌势可能会更加凶猛。","B":"当金价从高位下跌过程中出现反弹，当金价的反弹高度未到0.5线处，就重新下跌，则预示着这种反弹是下跌途中的中级抵抗，下跌行情尚未结束。","C":"当金价从高位下跌过程中出现反弹，当金价的反弹高度达到0.618线处时，说明金价的下跌趋势将趋缓，下跌行情也有可能转向横向整理的行情。","D":"当金价从高位下跌过程中出现反弹，当金价的反弹高度未到0.5线处，则预示着这种反弹是反转，下跌行情结束。"},"answer":"D"},{"id":122,"question":"利用黄金分割线判断黄金走势，上升行情中的无压力区，是指金价在上升过程中的（  ）这条黄金分割线以上的区域。","options":{"A":"0.382","B":"0.618","C":"0.5","D":"1.618"},"answer":"A"},{"id":123,"question":"利用黄金分割线判断黄金走势，上升行情中过程中回调至0.382--0.5这两条黄金分割线之间的区域是（  ）。","options":{"A":"无压力区","B":"强力支撑区","C":"最后支撑区","D":"无支撑区"},"answer":"B"},{"id":124,"question":"利用黄金分割线判断黄金走势，上升行情中过程中回调至0.5-0.618这两条黄金分割线之间的区域是（  ）。","options":{"A":"无压力区","B":"强力支撑区","C":"最后支撑区","D":"无支撑区 144、利用黄金分割线判断黄金走势，上升行情中过程中回调至0.618这个黄金分割线以下的区域是（D）。"},"answer":"C"},{"id":125,"question":"利用黄金分割线判断黄金走势，上升行情中过程中回调至（  ），则意味着原来的金价上升行情已经结束。","options":{"A":"无压力区","B":"强力支撑区","C":"最后支撑区","D":"无支撑区"},"answer":"D"},{"id":126,"question":"下跌行情中的（  ）是，指金价在下跌反弹过程中的0.618-0.5这两条黄金分割线之间的区域。","options":{"A":"无支撑区","B":"强压力区","C":"最后阻力区","D":"无压力区"},"answer":"B"},{"id":127,"question":"（  ）是以道·琼斯的“平均成本概念”为理论基础，采用统计学中“移动平均”的原理，将一段时期内的黄金价格平均值连成曲线，用来显示黄金的历史","options":{"A":"相对强弱指标","B":"移动平均线MA","C":"MACD指标","D":"KDJ指标"},"answer":"B"},{"id":128,"question":"不属于移动平均线根据时间长短分类的是（  ）","options":{"A":"短期移动平均线","B":"中期移动平均线","C":"长期移动平均线","D":"超短期移动平均线"},"answer":"D"},{"id":129,"question":"技术分析中的画线，上涨趋势中，将两个低点连成一条直线，就得到（  ）。","options":{"A":"上升趋势线","B":"下降趋势线","C":"轨道线","D":"压力线"},"answer":"A"},{"id":130,"question":"当指标处于高位，并形成一峰比一峰低的两个峰，而此时金价却对应的是一峰比一峰高，这就是所谓的（  ）。","options":{"A":"顶背离","B":"底背离","C":"买入信号","D":"超卖"},"answer":"A"},{"id":131,"question":"当金价的低点比前一次的低点低，而指标的低点却比指标前一次的低点低，这就是（  ）。","options":{"A":"顶背离","B":"底背离","C":"卖出信号","D":"超买"},"answer":"B"},{"id":132,"question":"（  ）是对统计关系进行定量描述的一种数学模型。该模型是研究一个变量（被解释变量）关于另一个（些）变量（解释变量）的具体依赖关系的计算方法和理论。","options":{"A":"回归模型","B":"随机波动模型","C":"灰色预测模型","D":"综合模糊理论"},"answer":"A"},{"id":133,"question":"（  ）是交易最活跃的货币，是外汇市场的风向标。","options":{"A":"美元","B":"欧元","C":"瑞士法郎","D":"英镑 155、美元指数上涨，说明美元与其他货币的比价上涨也就是说美元升值，那么"},"answer":"A"},{"id":134,"question":"国际上主要的商品都是以美元计价，那么所对应的商品价格应该是（  ）。","options":{"A":"下跌","B":"上涨","C":"无影响","D":"横向波动"},"answer":"A"},{"id":135,"question":"关于黄金价格与美元汇率的联动关系说法错误的是（  ）。","options":{"A":"美元汇率与黄金价格的波动，没有什么关系。","B":"美元汇率上升及伴随的资产价格上扬，短期资本就会涌入美元货币市场和美元资本市场，黄金价格就会相应走低。","C":"美元汇率下跌及相伴的美元资产价格下跌，短期资本就会流出美元货币市场和美元资本市场，涌入黄金市场，黄金价格就明显走高。","D":"根据近十年的历史数据统计，黄金价格与美元汇率有80%左右的负相关。"},"answer":"A"},{"id":136,"question":"世界经济健康时期或处于经济危机时期，黄金价格和美元指数的走势关联性说法错误的是（  ）。","options":{"A":"经济运行健康时期，黄金价格与美元指数呈负相关变动。","B":"在经济运行健康时期，黄金的属性主要表现在其货币属性。","C":"全球经济危机时期，黄金价格与美元指数呈正相关变动。","D":"在经济陷入危机之时，黄金的属性主要表现在其金融属性，黄金作为避险的投资选择。"},"answer":"B"},{"id":137,"question":"美元汇率与黄金价格之间的作用机制正常显现是要具备一定前提条件的。 不属于这个前提条件的是（  ）。","options":{"A":"国际地缘政治形势保持稳定","B":"国际经济金融形势平稳","C":"未发生大的动荡","D":"中东地区持续动乱"},"answer":"D"},{"id":138,"question":"以下属于宏观层面黄金价格和外汇汇率联动的是（  ）。","options":{"A":"美国经济长时间较佳，各国央行为了增加本国储备资产收益，纷纷减持黄金以购买美元资产。","B":"美元汇率与黄金价格呈反向关系，即美元升值，黄金价格疲软，反之亦然。 C、国际黄金主要以美元计价, 美元汇率的变动对黄金价格产生的影响最为显著。","D":"美国的物价上涨，货币供应量出现波动，黄金的货币属性成为影响黄金价格","C":"的主导因素。资本市场吸纳游资能力下降，游资进入黄金市场。"},"answer":"A"},{"id":139,"question":"黄金价格的走势和欧元汇率的走势整体呈现出（  ）。 A、非比例正相关性                   B、高度正相关性","options":{"C":"高度负相关性","D":"不相关性","A":"160、黄金作为一种重要的商品，其价格的涨跌，对商品货币也有一定的影响。","B":"一般而言，黄金价格的上涨能带动商品货币汇率的（A）。"},"answer":"A"},{"id":140,"question":"人民币汇率的变动与国际黄金价格的变动是（  ）。","options":{"A":"同向","B":"没有影响","C":"反向","D":"稍微有点影响"},"answer":"A"},{"id":141,"question":"从长期来看，石油与黄金产业价格在走势波动上有相似之处。黄金与原油之间存在着（  ）。","options":{"A":"正相关","B":"不相关","C":"负相关","D":"微弱的负相关"},"answer":"A"},{"id":142,"question":"不属于黄金价格和原油价格共同影响因素的是（  ）。","options":{"A":"美元汇率波动引发黄金价格和原油价格的同向波动。","B":"高原油价格加剧通货膨胀，通货膨胀引发黄金价格上涨。","C":"原油价格和黄金价格都受国际政治局势的影响。","D":"当原油价格低迷时，游资选择黄金市场。 164、不属于马克维茨投资组合理论的基本假设的是（D）。"},"answer":"D"},{"id":143,"question":"不属于马克维茨投资组合理论基本思路的是（  ）。","options":{"A":"投资者确定投资组合中合适的资产。","B":"投资者根据收益率的期望值与方差来选择投资组合。","C":"建立可供选择的证券有效集。结合具体的投资目标，最终确定最优证券组合。","D":"投资者尽可能的选择高收益投资品。"},"answer":"D"},{"id":144,"question":"基于回避风险的假设，不是马柯维茨建立的投资组合分析模型要点的是（  ）。","options":{"A":"投资组合的两个相关特征是期望回报率及其方差。","B":"投资将选择在给定风险水平下期望回报率最大的投资组合。","C":"投资将选择在给定期望回报率水平下风险最高、收益最高的投资组合。","D":"对每种证券的期望回报率、方差和与其他证券的协方差进行估计和挑选，并进行数学规划，以确定各证券在投资者资金中的比重。 168、在黄金市场运用投资组合理论进行决策分析说法错误的是（C）。"},"answer":"C"},{"id":145,"question":"利用投资组合理论参与黄金市场投资，基本假设错误的是（  ）。","options":{"A":"投资者遵循效用最大化原则。投资者是风险回避者，即在同等收益下，投资者选择最小风险的投资组合。","B":"投资者遵循收益率最大化原则。","C":"每个投资者根据期望值、方差以及协方差来选择最佳投资组合。","D":"黄金投资市场是完善的，无交易成本，且产品和工具可以无限细分。"},"answer":"B"},{"id":146,"question":"不是黄金投资组合策略需要考虑的角度是（  ）。","options":{"A":"持续过程和成本角度","B":"收益角度","C":"风险管理角度","D":"市场有效性的多角度"},"answer":"D"},{"id":147,"question":"黄金投资的低风险组合说法错误的是（  ）。","options":{"A":"在黄金价格处于上升趋势时，可以选择持有大比例的现金、持有一定比例的实物黄金和一定比例的黄金矿山类股票、持有小于总额的 5%-10%的多头黄金衍生品头寸。","B":"在黄金价格有下降趋势时，可以选择持有很大比例的现金或者是实物黄金、持有小比例的黄金矿山类股票、持有小于总额5%的空头黄金衍生品头寸。","C":"在黄金价格处于上升趋势时，可以选择持有大比例的现金、持有一定比例的实物黄金和一定比例的黄金矿山类股票、持有小于总额的20%-40%的多头黄金衍生品头寸。","D":"低风险组合比较适合刚刚参与金市且风险承受能力较小的散户投资者，以及风险规避意愿强烈的国有企业。"},"answer":"C"},{"id":148,"question":"黄金投资的中风险组合说法错误的是（  ）","options":{"A":"在黄金价格有上升趋势时，作为中风险组合，可以选择持有占总额的60%-70% 的现金，持有一定比例的实物黄金和黄金矿山类股票，及持有占总额的10%-20% 的多头黄金衍生品头寸。","B":"在黄金价格有下跌趋势时，则可以选择持有占总额60%-70%的现金，持有小比例的实物黄金和黄金矿山类股票，并可持有占总额10%-20%的空头黄金衍生品头寸。","C":"在黄金价格有下跌趋势时，则可以选择持有占总额20%-40%的现金，持有小比例的实物黄金和黄金矿山类股票，并可持有占总额20%-40%的空头黄金衍生品头寸。","D":"中风险组合对于能够承受一定投资风险的机构投资者来说，具有攻守兼备的特点，相对较为适宜。"},"answer":"C"},{"id":149,"question":"黄金投资的高风险组合说法错误的是（  ）","options":{"A":"在黄金价格有上升趋势时，高风险组合为：持有占总额的40-50%的现金、持有一定比例的实物黄金和黄金矿山类股票，并持有占总额20%-30%的多头黄金衍生品头寸。","B":"在黄金价格有下跌趋势时，便选择持有占总额40-50%的现金、持有小比例的实物黄金、持有小比例的黄金矿山类股票、持有占总额的20%-30%的空头黄金衍生品头寸。","C":"选择高风险组合的一般需对黄金投资和黄金市场非常熟悉的专业人士或机构才能择机采取。","D":"在黄金价格有上升趋势时，高风险组合为：持有占总额的35-55%的现金、持有一定比例的实物黄金和黄金矿山类股票，并持有占总额10%-20%的多头黄金衍生品头寸。"},"answer":"D"},{"id":150,"question":"交易策略对于市场参与者来说具有重要的意义，其主要表现作用错误的是 （  ）。","options":{"A":"提升资金利用效率","B":"降低交易风险","C":"获取更大投资效益","D":"提升交易频率"},"answer":"D"},{"id":151,"question":"以下特点的投资者，不适合黄金交易短线策略的是（  ）。","options":{"A":"适合对风险认知高的客户和保护实盘投资者","B":"积累丰富的实战经验和捕捉当日品种机会","C":"提高资金使用率和资金基本处于主动攻击状态","D":"参与金市且风险承受能力较小的散户投资者"},"answer":"D"},{"id":152,"question":"以下不属于黄金交易短线策略的是（  ）。","options":{"A":"日内单向性为主的交易","B":"日内双向波段交易者","C":"炒单交易者","D":"根据基本面长期持有的交易者"},"answer":"D"},{"id":153,"question":"对于典型的炒单手法描述错误的是（  ）。","options":{"A":"即以趋势为原则，根据盘面的动态反映，抓取每天价格波动里的波纹式的极小差价，进行顺势短线而主动买卖的炒作行为。","B":"以趋势性炒作为主流，以逆趋势炒作为辅，主要依据盘面的动态反映，抓取每天价格波动里的波纹式涨跌里的极小差价，进行顺势主动买卖和被动抓取回调或反弹的炒作行为。","C":"一种鲜为人见的炒单手法，炒作时必须是同一市场同一品种。在涨势当中，选择强势月份合约买入，同时选择弱势月份合约等交易额卖出，以此实现获利的目的。做空则反之。","D":"顺着当前的趋势进行买卖。如果当前趋势涨就买入开仓，当前趋势跌就卖出"},"answer":"D"},{"id":154,"question":"对于短线交易策略，下列属于错误短线交易信念的是（  ）。","options":{"A":"永远按照交易信号操作和顺势交易","B":"市场运动是测不准的，不要强求执行开仓","C":"资金管理和跟踪止损及止赢","D":"一旦亏损可以耐心等待变成长线交易策略"},"answer":"D"},{"id":155,"question":"用中线交易策略投资黄金，以下错误的是（  ）。","options":{"A":"熟悉交易规则","B":"控制风险及时止损","C":"掌握基本面分析","D":"出现亏损可以不止损耐心等待"},"answer":"D"},{"id":156,"question":"用长线交易策略投资黄金，以下错误的是（  ）。","options":{"A":"如果当前趋势涨就买入开仓，当前趋势跌就卖出开仓。","B":"顺势交易其实就是追涨杀跌。","C":"从长线来看赢家和输家的区别就在于风险管理。","D":"头寸的增加并不是一蹴而就的，而是应该在盈利的基础上逐步加码。"},"answer":"B"},{"id":157,"question":"关于套期保值说法错误的是（  ）。","options":{"A":"以一定的利率买进或卖出一定金额的金融资产，在一定时间后，再以相同或不同的利率卖出或买进相同金额的金融资产。","B":"利用不同时间利率的不同来套利，也可以称为是时间套利。","C":"说买进或卖出与现货市场交易数量相当，但交易方向相同的商品期货合约。","D":"未来某一时间通过卖出或买进相同的期货合约，对冲平仓，结清期货交易带来的盈利或亏损。"},"answer":"C"},{"id":158,"question":"关于套期保值交易的作用说法错误的是（  ）。","options":{"A":"增进企业经济效益方面发挥着重要的作用。","B":"企业通过套期保值来规避市场价格风险。","C":"提高企业生产经营决策的科学合理性。","D":"使企业能通过期货市场获取更多的利润。"},"answer":"D"},{"id":159,"question":"评价套期交易的有效性，以下错误的方法是（  ）。","options":{"A":"主要条款比较法","B":"比率分析法","C":"回归分析法","D":"趋势分析法"},"answer":"D"},{"id":160,"question":"不是套期保值的操作原则的是（  ）。","options":{"A":"商品种类相同原则","B":"商品数量相等原则","C":"月份相同或相近原则","D":"交易方向相同原则"},"answer":"D"},{"id":161,"question":"以下不适用买入套期保值的是（  ）。","options":{"A":"加工制造企业为了防止日后购进原料价格上涨的情况。","B":"供货方已经和需求方签订好现货供货合同。","C":"加工制造企业担心库存原料价格下跌。","D":"需求方认为目前现货市场的价格很合适。"},"answer":"C"},{"id":162,"question":"以下不适用卖出套期保值的是（  ）。","options":{"A":"直接生产商品期货产品的生产厂家，农场，工厂等手头有存货产品尚未销售将生产，收获某种商品期货实物，担心日后出售时价格下跌。","B":"储运商，贸易商手头有库存现货尚未出售或储运商，贸易商已签订将来以特定价格买进某一商品但尚未转售出去，担心日后出售时价格会下跌。","C":"加工制造企业担心库存原料价格下跌。","D":"加工制造企业为了防止日后购进原料价格上涨的情况。"},"answer":"D"},{"id":163,"question":"基差与套期保值效果的对应关系说法错误的是（  ）。","options":{"A":"不仅将现货风险全额对冲，而且还有盈利。","B":"现货风险只得到部分对冲，仍有亏损","C":"不仅没有对冲现货风险，反而新增了期货风险。","D":"当基差趋向于负向变化时，对卖出套期保值者有利。"},"answer":"D"},{"id":164,"question":"套期保值功能概述错误的是（  ）。","options":{"A":"避免商品价格的千变万化导致成本上升或利润下降，可利用期货交易进行套期保值。","B":"为了生产经营者提供一条增加利润的渠道。","C":"期货市场风险转移的功能，为黄金市场参与者回避、转移和分散风险。","D":"期货市场上买进或卖出与现货市场上数量相等但交易方向相反的商品，使两"},"answer":"B"},{"id":165,"question":"黄金生产企业通过期货市场进行风险转移的意义说法错误的是（  ）。","options":{"A":"黄金生产企业通过期货市场进行风险转移可以规避价格风险实现稳定经营。","B":"利于企业节约仓储与利息的交易。","C":"黄金期货市场可以成为黄金生产企业多元化投资渠道之一。","D":"增加了黄金生产企业增厚利润的渠道。"},"answer":"D"},{"id":166,"question":"不属于黄金消费企业进行套期保值意义的是（  ）。","options":{"A":"锁定采购成本，保证稳定经营。","B":"有利于帮助消费企业合理规划生产进度，合理配置库存。","C":"帮助企业进行技术升级，在提高黄金制品附加值上下功夫。","D":"增加黄金消费企业利润渠道。"},"answer":"D"},{"id":167,"question":"关于套利说法错误的是（  ）。","options":{"A":"实物资产或金融资产拥有两个价格的情况下，以较低的价格买进，较高的价格卖出，从而获取无风险收益。","B":"纠正市场价格或收益率的异常状况中获利的行动。","C":"同一产品在不同市场的价格出现显著差异，套利即低买高卖，导致价格回归均衡水平的行为。","D":"在价格回归均衡水平后，先了结亏损的头寸，盈利的头寸可以在观望。"},"answer":"D"},{"id":168,"question":"关于统计套利说法错误的是（  ）。","options":{"A":"利用证券价格的历史统计规律进行套利的。","B":"风险在于这种历史统计规律在未来一段时间内是否继续存在。","C":"统计套利的主要内容包括股票配对交易、股指套利、融券对冲和外汇套利交易。","D":"买进被相对低估的品种、卖空被相对高估的品种，等到价差回归均衡时，先了结亏损的头寸，盈利的头寸可以在观望。"},"answer":"D"},{"id":169,"question":"从黄金交易的时间角度来看，不属于黄金套利交易的是（  ）。","options":{"A":"跨期套利","B":"跨市套利","C":"跨商品套利","D":"信息不对称套利"},"answer":"D"},{"id":170,"question":"（  ）是利用同一商品但不同交割月份之间正常价格差距出现异常变化时进行对冲而获利的，又可分为牛市套利和熊市套利两种形式。","options":{"A":"跨期套利","B":"跨市套利","C":"跨商品套利","D":"信息不对称套利 197、（B）是在不同交易所之间的套利交易行为。当同一期货商品合约在两个或更多的交易所进行交易时，由于区域间的地理差别，各商品合约间存在一定的价差关系。"},"answer":"A"},{"id":171,"question":"（  ）是利用两种不同的、但相关联商品之间的价差进行交易。这两种商品之间具有相互替代性或受同一供求因素制约。","options":{"A":"跨期套利","B":"跨市套利","C":"跨商品套利","D":"信息不对称套利"},"answer":"C"},{"id":172,"question":"（  ）是指利用股指期货市场存在的不合理价格，同时参与股指期货与股票现货市场交易，或者同时进行不同期限、不同（但相近）类别股票指数合约交易，以赚取差价的行为。","options":{"A":"股指期货套利","B":"商品期货套利","C":"统计套利","D":"期权套利"},"answer":"A"},{"id":173,"question":"（  ）与股指期货对冲类似，大宗商品同样存在套利策略，在买入或卖出某种期货合约的同时，卖出或买入相关的另一种合约，并在某个时间同时将两种合约平仓。","options":{"A":"股指期货套利","B":"商品期货套利","C":"统计套利","D":"期权套利"},"answer":"B"},{"id":174,"question":"（  ）是利用证券价格的历史统计规律进行套利的，是一种风险套利，其风险在于这种历史统计规律在未来一段时间内是否继续存在。","options":{"A":"股指期货套利","B":"商品期货套利","C":"统计套利","D":"期权套利 202、不属于黄金矿山生产基本任务的是（D）。"},"answer":"C"},{"id":175,"question":"不是黄金矿山企业建设特点的是（  ）。","options":{"A":"建设风险较大、日常生产管理复杂。","B":"日常生产管理复杂。","C":"利润逐年增加。","D":"矿业基建投资的持续性。"},"answer":"C"},{"id":176,"question":"关于制定套期保值交易计划不正确的是（  ）。","options":{"A":"根据自己的生产、经营情况鉴别公司所面临的风险种类、期限长短、规模大小等性质并设定自己的交易目标和预防风险百分比。","B":"制定整个套期保值的交易策略，包括建仓方向、建仓数量、建仓时间的选择以及建仓和结束套期保值的价格区城和时间范围的确定。","C":"根据自己每年的利润目标确定建仓期货合约的月份序列和结束套期保值的期限区间。","D":"依据交易目标和常用的基本因素分析和技术分析，设定和建立、结束套期保"},"answer":"C"},{"id":177,"question":"关于黄金生产商做卖出套期保值说法不正确的是（  ）。","options":{"A":"先在期货市场上卖出与将要在现货市场上卖出的商品数量相等、到期日相同或相近的该商品的期货合约。","B":"在现货市场上卖出该商品的同时，再在期货市场上买进与原先卖出的期货合约数量相等、到期日相同的该商品的期货合约。","C":"黄金生产商通过卖出套期保值进行风险转移可以规避价格风险实现稳定经营。","D":"黄金生产商通过卖出套期保值只能转移部分风险，仍需承受一定的风险。"},"answer":"D"},{"id":178,"question":"关于黄金生产商做卖出套期保值的基本原则说法错误的是（  ）。","options":{"A":"选择的期货商品必须和套期保值者将在现货市场中买进或卖出的现货商品在种类上相同。","B":"所选用的期货合约上所载的商品数量与交易者将要在现货市场上买进或卖出的商品数量大致相等。","C":"所选用的期货合约的交割月份最好与交易者将来在现货市场上实际买进或卖出现货商品的时间相同或相近。","D":"套期保值者必须同时或相近时间内在现货市场上和期货市场上采取相反的买卖行动，即进行反向操作。"},"answer":"B"},{"id":179,"question":"不属于我国黄金矿山规模特点的是（  ）。","options":{"A":"黄金矿山规模大。","B":"负债重","C":"效益差","D":"竞争力比较弱"},"answer":"A"},{"id":180,"question":"下列关于交叉套期保值的说法正确的是（  ）。","options":{"A":"当期货商品没有对应的期货品种时，不能进行套期保值。","B":"交叉套期保值中选择作为替代物的期货品种的替代性越弱，交叉套期保值的效果就会越好。","C":"交叉套期保值中选择作为替代物的期货品种的替代性越强，交叉套期保值的效果就会越好。","D":"在现货市场上卖出该商品的同时，再在期货市场上买进与原先卖出的期货合约数量相等、到期日相同的该商品的期货合约。"},"answer":"C"},{"id":181,"question":"交叉套期保值指的是（  ）。","options":{"A":"买入套期保值","B":"卖出套期保值","C":"空头套期保值","D":"在期货市场上寻找与现货在功能上比较接近的品质以其作为替代品进行套期保值"},"answer":"D"},{"id":182,"question":"下列有关套期保值与投机的说法中，正确的是（  ）。","options":{"A":"投机是指为冲抵风险而买卖相应的衍生产品的行为","B":"套期保值的目的是承担额外的风险以盈利","C":"套期保值和投机的结果都是降低了风险","D":"一般来说，不能从衍生产品的交易本身判断该交易是否为套期保值或投机，要考虑它的头寸。"},"answer":"D"},{"id":183,"question":"关于基差，下列说法不正确的有（  ）。","options":{"A":"采用买进套期保值策略，当基差走弱时，套期保值可以赚钱","B":"采用买进套期保值策略，当基差走强时，套期保值可以赚钱","C":"采用卖出套期保值策略，当基差走弱时，套期保值出现亏损","D":"采用卖出套期保值策略，当基差走强时，套期保值可以赚钱"},"answer":"B"},{"id":184,"question":"下列关于套利交易说法错误的是（  ）。","options":{"A":"从不同的两个期货合约彼此间相对的价格差异中套取利润。","B":"套利交易就是投机者同时买进或卖出两种价格变化幅度不同的期货合约，从中套取二者的价差利润的交易行为。","C":"决定这种交易的成功与否，便在于开始套利的价格及最后清算它们的价格之间的相对变动程度。","D":"利用单一期货合约价格的上下波动赚取利润。"},"answer":"D"},{"id":185,"question":"（  ）是指在买进某一交割月份期货商品合约的同时，卖出另一交割月份的同类期货商品合约。","options":{"A":"跨月份套利交易","B":"跨商品套利交易","C":"跨市场套利交易","D":"期现套利交易"},"answer":"A"},{"id":186,"question":"（  ）是指在买进某一交割月份的某一种期货商品合约的同时，卖出另一相同交割月份但商品品种不同却相关联的期货合约。","options":{"A":"跨月份套利交易","B":"跨商品套利交易","C":"跨市场套利交易","D":"期现套利交易"},"answer":"B"},{"id":187,"question":"（  ）是指在某个交易所卖出某一交割月份的期货合约，同时在另一个交易所买进同一交割月份的期货合约。","options":{"A":"跨月份套利交易","B":"跨商品套利交易","C":"跨市场套利交易","D":"蝶式套利交易"},"answer":"C"},{"id":188,"question":"不属于跨月份套利交易操作技巧的是（  ）。","options":{"A":"牛市套利","B":"是熊市套利","C":"蝶式套利","D":"期现套利"},"answer":"D"},{"id":189,"question":"下列属于牛市套利的市场行情特征的是（  ）。","options":{"A":"在看涨的市场中，近期期货合约的价格上涨幅度将大于远期期货合约的上涨幅度。","B":"在看跌的市场中，近期期货合约的价格下跌幅度将大于远期期货合约的下跌幅度。","C":"在看涨的期货市场中，远期合约价格的上涨幅度大于近期合约价格的上涨幅度。","D":"在看跌的期货市场中，远期合约价格的下跌幅度小于近期合约价格的下跌幅度。"},"answer":"A"},{"id":190,"question":"下列属于熊市套利的市场行情特征的是（  ）。","options":{"A":"在看涨的期货市场中，远期合约价格的上涨幅度大于近期合约价格的上涨幅度。","B":"在看跌的期货市场中，远期合约价格的下跌幅度大于近期合约价格的下跌幅度。","C":"在看涨的市场中，近期期货合约的价格上涨幅度将大于远期期货合约的上涨幅度。","D":"在看跌的市场中，近期期货合约的价格下跌幅度将小于远期期货合约的下跌幅度。"},"answer":"A"},{"id":191,"question":"下列对于风险的特征描述不正确的是（  ）。","options":{"A":"风险是客观存在的，是不以人的意志为转移的。","B":"风险的存在是风险发生的前提条件。由风险发生的偶然性和不确定性，我们可以推论出在一定条件下，风险是可变性的。","C":"风险与收益是一体的、共生的。","D":"风险是可以识别的，因而也是杜绝的。"},"answer":"D"},{"id":192,"question":"下列关于黄金投资风险来源说法错误的是（  ）","options":{"A":"交易工具风险","B":"结构性风险","C":"市场风险","D":"期限风险"},"answer":"D"},{"id":193,"question":"下列属于黄金投资的低风险组合的是（  ）。","options":{"A":"实金+黄金累积计划+黄金ETF+黄金企业债券","B":"纸黄金+黄金现货保证金交易产品+黄金企业股票","C":"纸黄金+黄金现货保证金交易产品+黄金期权","D":"黄金现货保证金交易产品+黄金期货+黄金期权+黄金企业股票"},"answer":"A"},{"id":194,"question":"下列属于黄金投资的中风险组合的是（  ）。","options":{"A":"实金+黄金现货保证金交易产品","B":"纸黄金+黄金现货保证金交易产品+黄金企业股票","C":"实金+黄金累积计划+黄金ETF+黄金企业债券","D":"黄金现货保证金交易产品+黄金期货+黄金期权+黄金企业股票"},"answer":"B"},{"id":195,"question":"下列属于黄金投资的高风险组合的是（  ）。","options":{"A":"实金+黄金现货保证金交易产品","B":"纸黄金+黄金现货保证金交易产品+黄金企业股票 C、纸黄金+黄金现货保证金交易产品+黄金期权","D":"黄金现货保证金交易产品+黄金期货+黄金期权+黄金企业股票"},"answer":"D"},{"id":196,"question":"不属于投资项目风险分析的阶段是（  ）。","options":{"A":"风险识别","B":"风险估计","C":"风险评价","D":"风险管理"},"answer":"D"},{"id":197,"question":"关于投资项目风险识别说法错误的是（  ）。","options":{"A":"从系统的观点出发，横观投资项目所涉及的各个方面，纵观项目建设的发展过程，将引起风险的极其复杂的事物分解成比较简单的、容易被识别的基本单元。","B":"风险识别过程通常是由风险分析人员与投资项目的规划、设计人员及有关专家一同进行。","C":"采用的主要方法是通过调查、分解、讨论等提出所有可能存在的风险因素，并且分析和筛选那些影响微弱、作用不大的因素，然后研究主要因素间的关系。","D":"各风险因素所引起后果的严重程度基本相同。"},"answer":"D"},{"id":198,"question":"下列关于风险评估说法错误的是（  ）。","options":{"A":"对识别出的风险进行测量，给定某一风险发生的概率。","B":"对于大型投资项目，由于缺乏历史资料的借鉴，经常利用主观概率估计的方法对识别出的风险进行估计。","C":"在风险估计阶段的主要任务，就是在综合考虑主要风险影响的基础上，对随机投入、产出流的概率分布进行估计，并对各个流之间的各种关系进行研究。","D":"在实际可行性研究中进行风险分析时，所遇到的许多事件不能，或不可能进行试验，因而可以靠猜测做出准确的分析。"},"answer":"D"},{"id":199,"question":"下列为了避免或减小风险而对项目风险采取措施不正确的是（  ）。","options":{"A":"对损失大、概率大的灾难性的风险要避免，即风险避免。","B":"对损失小、概率大的风险，可采取措施来降低风险量，即风险降低。","C":"对损失大、概率小的风险，可通过保险或合同条款将责任转移，即风险转移。","D":"对损失小、概率小的风险，可采取观望态度，即风险自留。"},"answer":"D"},{"id":200,"question":"（  ）是指期货合约缺乏流动性所造成的风险。对于场内交易的标准化合约来说，由于标准化程度高，交易者可随时根据市场环境变化决定头寸的维护，流动性风险较小。","options":{"A":"价格风险","B":"流动性风险","C":"交割风险","D":"信用风险"},"answer":"B"},{"id":201,"question":"（  ）是由于各种原因，还会存在品质、品牌上的差异，造成生产经营风险，给交割增加了许多潜在风险。","options":{"A":"价格风险","B":"流动性风险","C":"交割风险","D":"信用风险"},"answer":"C"},{"id":202,"question":"（  ）是在现货市场上生产经营某一具体品种。套期保值者在期货市场上交易的标的物应与之保持一致，以期收到较好保值效果，但这一点很难做到，因此","options":{"A":"价格风险","B":"流动性风险","C":"品种选择风险","D":"信用风险"},"answer":"C"},{"id":203,"question":"（NDF）为6.6905人民币元/美元，则人民币金价为（  ）。","options":{"A":"（A）279.64元/g      （B）306.80元/g","B":"（C）281.76元/g      （D）311.92元/g","C":"根据相对估值法，如果2013年全球黄金存量为16万吨，美元M2货币存量为 11万亿美元，那么黄金价格应为（B）。","D":"根据上海期货交易所的规定，现货合约和现货延期合约的开盘价通过集合竞价的方式产生。黄金期货G在开盘前收到了委托买盘和卖盘情况如下表。那么该期货的开盘价应该为（C）。"},"answer":"A"},{"id":204,"question":"（  ）3.8        （  ）3. wer":"B","material":"材料 11 Au（T+D）合约的周 K 线走势图。请看图并结合相关知识回答以下问题。"},{"id":51,"question":"对于赵某的行为，是将风险和收益均放大到了极值，对于风险和收益的描述， 以下哪项是正确的：（  ）","options":{"A":"高风险往往伴随着高收益","B":"高风险并不一定会带来高收益","C":"高收益不一定会伴随着高风险","D":"高风险和高收益没有必然联系"},"answer":"B","material":"材料 12 赵某是一位黄金期货的投资者。通过分析，赵某认为美国大选或将短期引发行情的剧烈波动，准备博弈特朗普和拜登的大选行情，于是在大选前夕开仓黄金期货 10 手，保证金占到本金的 80%以上。大选开始后，黄金价格出现连续宽幅震荡，赵某由于占用保证金比例过高，被迫强行平仓，亏损巨大。"},{"id":52,"question":"赵某其实可以考虑转移风险原则来进行处理，以下哪种行为不符合转移风险的原则（  ）。","options":{"A":"黄金期货和黄金现货同时购买","B":"黄金和白银同时购买","C":"不同交易市场同时购买黄金期货","D":"不同交割月份的黄金合约同时购买"},"answer":"B","material":"材料 12 赵某是一位黄金期货的投资者。通过分析，赵某认为美国大选或将短期引发行情的剧烈波动，准备博弈特朗普和拜登的大选行情，于是在大选前夕开仓黄金期货 10 手，保证金占到本金的 80%以上。大选开始后，黄金价格出现连续宽幅震荡，赵某由于占用保证金比例过高，被迫强行平仓，亏损巨大。"},{"id":53,"question":"美国大选属于以下哪种风险类型：（  ）","options":{"A":"国际地缘政治风险","B":"市场风险","C":"信用风险","D":"国家风险 4、除开美国大选外，国际上重大的政治、战争事件都将影响黄金价格，刺激金价。这是黄金发挥着（A）。"},"answer":"A","material":"材料 12 赵某是一位黄金期货的投资者。通过分析，赵某认为美国大选或将短期引发行情的剧烈波动，准备博弈特朗普和拜登的大选行情，于是在大选前夕开仓黄金期货 10 手，保证金占到本金的 80%以上。大选开始后，黄金价格出现连续宽幅震荡，赵某由于占用保证金比例过高，被迫强行平仓，亏损巨大。"},{"id":54,"question":"美国大选，黄金价格出现剧烈波动，说明黄金价格与美国经济以及相关政策的关系密切，所以黄金投资离不开对美国政治经济形势的深入分析，以下有关原因中，错误的是（  ）。","options":{"A":"黄金用美元标价。","B":"美国是最大的经济资源消耗国。","C":"国际投资在很大程度上是在美国本土上的金融投资，美国资本市场是世界上最大的投资市场之一。","D":"美国是全球最大的黄金消费国。"},"answer":"D","material":"材料 12 赵某是一位黄金期货的投资者。通过分析，赵某认为美国大选或将短期引发行情的剧烈波动，准备博弈特朗普和拜登的大选行情，于是在大选前夕开仓黄金期货 10 手，保证金占到本金的 80%以上。大选开始后，黄金价格出现连续宽幅震荡，赵某由于占用保证金比例过高，被迫强行平仓，亏损巨大。"},{"id":55,"question":"该投资者认为后期金银比值将会恢复，有套利交易机会那么该投资和应该如何操作：（  ）","options":{"A":"买入黄金多单，买入白银空单","B":"买入黄金空单，买入白银空单","C":"买入黄金多单，买入白银多单","D":"买入黄金空单，买入白银多单"},"answer":"D","material":"材料 13 2020 年因为金银比值扩大，某投资者在黄金 TD 账户存入保证金 10 万元， 分别购买黄金 T+D 一手与白银 T+D 十手开仓报价分别为：黄金 380 元/克 白银 3000/千克那么："},{"id":56,"question":"此时行情如何波动符合该投资者预期：（  ）","options":{"A":"黄金上涨，白银震荡","B":"黄金震荡，白银下跌","C":"黄金上涨，白银下跌","D":"黄金下跌，白银震荡"},"answer":"D","material":"材料 13 2020 年因为金银比值扩大，某投资者在黄金 TD 账户存入保证金 10 万元， 分别购买黄金 T+D 一手与白银 T+D 十手开仓报价分别为：黄金 380 元/克 白银 3000/千克那么："},{"id":57,"question":"该套利的交易模式 险可控 5、投资型金条、金币的价格主要围绕国际金价波动，交易成本较低，易被回购。"},"answer":"C","material":"材料 14 李阿姨今年 58 岁，2020 年初看到黄金价格上涨，欲购买一些黄金理财产品用于投资。在和相关专业人沟通后，在现货价格 350 元/克的时候，购买了 100 克投资金条，100 克熊猫金币，又分别给女儿和儿媳购买了 50 克，共计 100克的金银首饰。2020年8月黄金价格突破历史高点涨至449元/克的时候，选择卖出了投资金条。"},{"id":64,"question":"这类实物金较适合李阿姨这种投资者，因为李阿姨属于（  ）。","options":{"A":"投机盈利为目的的投资者","B":"增值保值为目的的投资者","C":"收藏为目的的投资者","D":"消费为目的的投资者"},"answer":"B","material":"材料 14 李阿姨今年 58 岁，2020 年初看到黄金价格上涨，欲购买一些黄金理财产品用于投资。在和相关专业人沟通后，在现货价格 350 元/克的时候，购买了 100 克投资金条，100 克熊猫金币，又分别给女儿和儿媳购买了 50 克，共计 100克的金银首饰。2020年8月黄金价格突破历史高点涨至449元/克的时候，选择卖出了投资金条。"},{"id":65,"question":"从影响金价因素的四个层次来看，美联储意外降息属于哪一个层次？（  ）","options":{"A":"国际地缘政治","B":"国际经济形势","C":"国际金融形势","D":"国际投资市场游资结构调整 2、美联储意外降息后，对于金价的影响是（D）"},"answer":"C","material":"材料 15 2020 年 3 月 4 日，美股开盘后半小时，美联储突然发布了一篇意外的政策 声明，将美国联邦基金利率的目标区间大幅下调 50 个基点，降至 1%-1.25%。声明写道：“美国经济的基本面仍然强劲，然而，新冠病毒对美国经济活动构成不断发展的风险。鉴于这些风险，同时为了实现最大化就业和价格稳定的双重目标，联邦公开市场委员会 FOMC 今天决定降息。委员会正密切监测事态发展及其对美国经济前景的影响，将使用其工具并采取适当行动支持经济。” 在美联储今日意外降息 50 个基点后，美联储主席鲍威尔表示，美联储在看到新型冠状病毒对经济前景产生实质性影响后，采取了紧急的降息措施。美联储将继续关注新冠状病毒并相应地调整政策。不过他表示，应对措施将以降息而非增加资产购买或量化宽松的形式进行。"},{"id":66,"question":"从事后的走势来看，短期实际影响金价的主要因素是（  ）","options":{"A":"国际地缘政治","B":"国际经济形势","C":"国际金融形势","D":"国际投资市场游资结构调整"},"answer":"D","material":"材料 15 2020 年 3 月 4 日，美股开盘后半小时，美联储突然发布了一篇意外的政策 声明，将美国联邦基金利率的目标区间大幅下调 50 个基点，降至 1%-1.25%。声明写道：“美国经济的基本面仍然强劲，然而，新冠病毒对美国经济活动构成不断发展的风险。鉴于这些风险，同时为了实现最大化就业和价格稳定的双重目标，联邦公开市场委员会 FOMC 今天决定降息。委员会正密切监测事态发展及其对美国经济前景的影响，将使用其工具并采取适当行动支持经济。” 在美联储今日意外降息 50 个基点后，美联储主席鲍威尔表示，美联储在看到新型冠状病毒对经济前景产生实质性影响后，采取了紧急的降息措施。美联储将继续关注新冠状病毒并相应地调整政策。不过他表示，应对措施将以降息而非增加资产购买或量化宽松的形式进行。"},{"id":67,"question":"从基本面分析来看，美联储意外降息对金价的影响逻辑是（  ）","options":{"A":"美联储意外降息 50 个基点，提高了市场的流动性，降低了利率，利多金价走势。","B":"美联储意外降息 50 个基点，给市场造成了恐慌，避险情绪短期推动金价走高，长期来看，将对冲疫情对于经济的影响，削弱市场避险情绪，打压金价走势。","C":"美联储意外降息 50 个基点，给市场造成了恐慌，投资者抛售一切资产，市场陷入流动性风险，黄金下跌，而从长期来看，降息将对冲疫情对于经济的影响，削弱市场避险情绪，继续打压金价走势。","D":"美联储意外降息 50 个基点，给市场造成了恐慌，投资者抛售一切资产，市场陷入流动性风险，黄金下跌，而从长期来看，降低了利率，利多金价走势。 5、全球新冠疫情对于金价的影响描述错误的是？（A）"},"answer":"D","material":"材料 15 2020 年 3 月 4 日，美股开盘后半小时，美联储突然发布了一篇意外的政策 声明，将美国联邦基金利率的目标区间大幅下调 50 个基点，降至 1%-1.25%。声明写道：“美国经济的基本面仍然强劲，然而，新冠病毒对美国经济活动构成不断发展的风险。鉴于这些风险，同时为了实现最大化就业和价格稳定的双重目标，联邦公开市场委员会 FOMC 今天决定降息。委员会正密切监测事态发展及其对美国经济前景的影响，将使用其工具并采取适当行动支持经济。” 在美联储今日意外降息 50 个基点后，美联储主席鲍威尔表示，美联储在看到新型冠状病毒对经济前景产生实质性影响后，采取了紧急的降息措施。美联储将继续关注新冠状病毒并相应地调整政策。不过他表示，应对措施将以降息而非增加资产购买或量化宽松的形式进行。"},{"id":68,"question":"21 世纪初，中国加入 WTO 对世界经济格局产生影响，从而推动国际金价上涨，从黄金价格影响因素层级来分析，属于（  ）？","options":{"A":"国际地缘政治","B":"国际经济形势","C":"国际金融形势","D":"国际投资市场游资结构调整"},"answer":"B","material":"材料 16 21 世纪，2001 年中国加入 WTO 对于整个世界经济格局产生了极为重要和深远的影响，一方面使得拥有最多人口的经济体与世界经济连为一体，另一方面促进了世界范围内产业分工的重新调整，从而激发了全球经济增长活力。全球经济受益于中国较低的劳动力成本从而扩大了对于各类大宗商品的需求，同时中国自身快速的经济发展也极大地推动了各类大宗商品的需求，这使得全球大宗商品价格出现了一轮长周期的牛市上涨行情。 美铜期货价格从 2001 年 0.62 美元/磅上涨到了 2008 年 4.2 美元/磅，而原油价格从 2002 年 18 美元/桶，上涨到了 2008 年 147 美元/桶，伴随着大宗商品价格的上涨，通货膨胀逐渐走高，对黄金价格形成了较强的支撑与刺激，同期 黄金价格从 2001 年 260 美元/盎司上涨至 2008 年 1000 美元/盎司。"},{"id":69,"question":"中国加入 WTO 从而扩大了各类大宗商品的需求，使得大宗商品价格上涨导致（  ）走高？","options":{"A":"通货膨胀","B":"金价","C":"汇率","D":"利率"},"answer":"A","material":"材料 16 21 世纪，2001 年中国加入 WTO 对于整个世界经济格局产生了极为重要和深远的影响，一方面使得拥有最多人口的经济体与世界经济连为一体，另一方面促进了世界范围内产业分工的重新调整，从而激发了全球经济增长活力。全球经济受益于中国较低的劳动力成本从而扩大了对于各类大宗商品的需求，同时中国自身快速的经济发展也极大地推动了各类大宗商品的需求，这使得全球大宗商品价格出现了一轮长周期的牛市上涨行情。 美铜期货价格从 2001 年 0.62 美元/磅上涨到了 2008 年 4.2 美元/磅，而原油价格从 2002 年 18 美元/桶，上涨到了 2008 年 147 美元/桶，伴随着大宗商品价格的上涨，通货膨胀逐渐走高，对黄金价格形成了较强的支撑与刺激，同期 黄金价格从 2001 年 260 美元/盎司上涨至 2008 年 1000 美元/盎司。"},{"id":70,"question":"通货膨胀走高，推动金价走高，从黄金价格影响因素层级来分析，属于（  ）？","options":{"A":"国际地缘政治","B":"国际金融形势","C":"国际经济形势","D":"国际投资市场游资结构调整"},"answer":"C","material":"材料 16 21 世纪，2001 年中国加入 WTO 对于整个世界经济格局产生了极为重要和深远的影响，一方面使得拥有最多人口的经济体与世界经济连为一体，另一方面促进了世界范围内产业分工的重新调整，从而激发了全球经济增长活力。全球经济受益于中国较低的劳动力成本从而扩大了对于各类大宗商品的需求，同时中国自身快速的经济发展也极大地推动了各类大宗商品的需求，这使得全球大宗商品价格出现了一轮长周期的牛市上涨行情。 美铜期货价格从 2001 年 0.62 美元/磅上涨到了 2008 年 4.2 美元/磅，而原油价格从 2002 年 18 美元/桶，上涨到了 2008 年 147 美元/桶，伴随着大宗商品价格的上涨，通货膨胀逐渐走高，对黄金价格形成了较强的支撑与刺激，同期 黄金价格从 2001 年 260 美元/盎司上涨至 2008 年 1000 美元/盎司。"},{"id":71,"question":"2001 年 "question":"请根据以下假设数据计算该出金商最终以何价买入的黄金合约？假设 1 月 17 日，5 月份黄金的期价为每克 425 元；4 月 17 日，黄金现价为每克 400 元， 5 月份的黄金期价为每克 410 元.（  ）","options":{"A":"385 元","B":"425 元","C":"400 元","D":"395 元"},"answer":"A","material":"材料 29 某金商，2020 年 1 月 17 日签定一份 3 个月后提货 30 公斤黄金的合约，价格依据签约当天的价格每克 450 元签定.但是 4 月 17 日交货时的现货价格不可能和 1 月 17 日成交时的现货价格完全一样，一旦现货下降，该笔交易的成本就会增加，甚至蚀本.金商经权衡，决定通过套期保值交易来保值.假设 1 月 17 日期现价格一致"},{"id":128,"question":"从影响金价因素的四个层次来看，英国“脱欧”属于哪一个层次？（  ） A、国际地缘政治","options":{"A":"国际经济形势","B":"国际金融形势","C":"国际投资市场游资结构调整","D":"以下走势哪一个是公投结果公布当天金价的走势？（B）"},"answer":"A","material":"材料 30 当地时间 2016 年 6 月 24 号上午，英国“脱欧”公投计票结果揭晓，多数投票者赞成英国脱离欧盟。最终计票结果显示，超过 1740 万投票者支持英国脱离欧盟，约 1600 万人支持留在欧盟。“脱欧”支持率为 51.89％，“留欧”支持率为 48.11％。支持“留欧”的英国首相卡梅伦随后号发表讲话，表示尊重英国人民的选择，在 10 月辞去首相职务，重新举行大选。"},{"id":129,"question":"以下关于英国脱欧说法正确的是？（  ）","options":{"A":"英国脱欧公投结果公布后，投资者看淡英国短期经济，并担心冲击欧盟经济，英镑大幅贬值，拖累欧元走势，推动美元指数上涨，美元指数与金价成反比关系，因此金价下跌。","B":"英国脱欧公投结果公布后，避险情绪快速升温，推动金价大幅上涨。","C":"英国脱欧属于典型的黑天鹅事件，风险无法规避。","D":"英国脱欧公投结果公布后，全球风险资产被广泛抛售，给市场造成了流"},"answer":"B","material":"材料 30 当地时间 2016 年 6 月 24 号上午，英国“脱欧”公投计票结果揭晓，多数投票者赞成英国脱离欧盟。最终计票结果显示，超过 1740 万投票者支持英国脱离欧盟，约 1600 万人支持留在欧盟。“脱欧”支持率为 51.89％，“留欧”支持率为 48.11％。支持“留欧”的英国首相卡梅伦随后号发表讲话，表示尊重英国人民的选择，在 10 月辞去首相职务，重新举行大选。"},{"id":130,"question":"划初始资金为 1000 万，投资期限为一年。计划收益 20%以上。 1、在拟定计划以后，黄金投资风险管理也应做好相应规划，以下哪项不属于黄金投资风险管理的范畴？（  ）","options":{"A":"黄金投资风险种类","B":"风险管理原则","C":"黄金投资计划拟定","D":"风险控制程序"},"answer":"C","material":"材料 31 国内某大型投资公司，关注到 2020 年黄金价格走势突破历史新高，认为未来国际黄金价格仍有进一步上涨的动能和空间，拟定了一个黄金投资计划。该计"},{"id":131,"question":"对于黄金价格的分析中，技术分析优点描述错误的是（  ）。","options":{"A":"技术分析具备全面、直接、准确、可操作性强、适用范围广等显著特点。","B":"技术分析进行交易的见效快，获得利益的周期短。","C":"技术分析对市场的反应比较直接，分析的结果也更接近实际市场的局部现象。","D":"技术分析能够比较全面地把握价格的基本走势。"},"answer":"D","material":"材料 31 国内某大型投资公司，关注到 2020 年黄金价格走势突破历史新高，认为未来国际黄金价格仍有进一步上涨的动能和空间，拟定了一个黄金投资计划。该计"},{"id":132,"question":"在该项黄金投资计划中，如果采用中风险的投资组合，以下哪项是正确的（  ）。","options":{"A":"实金+黄金现货保证金交易产品","B":"纸黄金+黄金现货保证金交易产品+黄金企业股票","C":"实金+黄金累积计划+黄金 ETF+黄金企业债券","D":"黄金现货保证金交易产品+黄金期货+黄金期权+黄金企业股票"},"answe A":"布雷顿深林体系解体后，美元与黄金脱钩，黄金和美元因避险需求大幅上涨。","B":"1973 年 10 月 6 日，第四次中东战争爆发。","C":"1979 年上半年，伊朗伊斯兰革命。","D":"阿拉伯国家发动了石油战，造成了历史上“第一次石油危机”。"},"answer":"A","material":"材料 33 1973 年布雷顿森林体系解体之前，由于国际上通行金本位(金汇兑本位)，黄金价格受到管制，因此不存在价格上的剧烈波动问题。但伴随着越南战争把美国经济拖入低谷和随后布雷顿森林体系的解体，黄金价格开始随着市场价格自由浮动，其价格开始出现剧烈波动。1973-1980 年间世界黄金价格大幅上涨。 1973 年 10 月 6 日，埃及与叙利亚分别攻击六年前被以色列占领的西奈半岛和戈兰高地，第四次中东战争爆发。在发动战争的同时，阿拉伯国家第一次发动了石油战，将原油价格从 3 美元提高到 10 美元，暴涨 2 倍多，造成了历史上“第一次石油危机”，西方经济体开始陷入滞胀的泥潭。1979 年上半年，伊朗伊斯兰革命造成石油短缺，对黄金市场起到刺激作用。"},{"id":140,"question":"以下哪些事件不属于国际地缘政治（  ）？","options":{"A":"布雷顿深林体系解体后，美元与黄金脱钩，美元贬值。","B":"1973 年 10 月 6 日，第四次中东战争爆发。","C":"1979 年上半年，伊朗伊斯兰革命。","D":"阿拉伯国家发动了石油战，造成了历史上“第一次石油危机”。"},"answer":"A","material":"材料 33 1973 年布雷顿森林体系解体之前，由于国际上通行金本位(金汇兑本位)，黄金价格受到管制，因此不存在价格上的剧烈波动问题。但伴随着越南战争把美国经济拖入低谷和随后布雷顿森林体系的解体，黄金价格开始随着市场价格自由浮动，其价格开始出现剧烈波动。1973-1980 年间世界黄金价格大幅上涨。 1973 年 10 月 6 日，埃及与叙利亚分别攻击六年前被以色列占领的西奈半岛和戈兰高地，第四次中东战争爆发。在发动战争的同时，阿拉伯国家第一次发动了石油战，将原油价格从 3 美元提高到 10 美元，暴涨 2 倍多，造成了历史上“第一次石油危机”，西方经济体开始陷入滞胀的泥潭。1979 年上半年，伊朗伊斯兰革命造成石油短缺，对黄金市场起到刺激作用。"},{"id":141,"question":"黄金价格的影响因素中，各层级因素对黄金价格的影响具有非常鲜明的层次性，下列是第一层级的影响因素的是（  ）？单选","options":{"A":"国际地缘政治","B":"国际经济形势","C":"国际金融形势","D":"国际投资市场游资结构调整"},"answer":"A","material":"材料 33 1973 年布雷顿森林体系解体之前，由于国际上通行金本位(金汇兑本位)，黄金价格受到管制，因此不存在价格上的剧烈波动问题。但伴随着越南战争把美国经济拖入低谷和随后布雷顿森林体系的解体，黄金价格开始随着市场价格自由浮动，其价格开始出现剧烈波动。1973-1980 年间世界黄金价格大幅上涨。 1973 年 10 月 6 日，埃及与叙利亚分别攻击六年前被以色列占领的西奈半岛和戈兰高地，第四次中东战争爆发。在发动战争的同时，阿拉伯国家第一次发动了石油战，将原油价格从 3 美元提高到 10 美元，暴涨 2 倍多，造成了历史上“第一次石油危机”，西方经济体开始陷入滞胀的泥潭。1979 年上半年，伊朗伊斯兰革命造成石油短缺，对黄金市场起到刺激作用。"},{"id":142,"question":"在黄金价格的影响因素中，下列哪个因素层级是 1973-1980 年间世界黄金价格大幅上涨的根本性因素（  ）？","options":{"A":"国际地缘政治","B":"国际经济形势","C":"国际金融形势","D":"国际投资市场游资结构调整"},"answer":"A","material":"材料 33 1973 年布雷顿森林体系解体之前，由于国际上通行金本位(金汇兑本位)，黄金价格受到管制，因此不存在价格上的剧烈波动问题。但伴随着越南战争把美国经济拖入低谷和随后布雷顿森林体系的解体，黄金价格开始随着市场价格自由浮动，其价格开始出现剧烈波动。1973-1980 年间世界黄金价格大幅上涨。 1973 年 10 月 6 日，埃及与叙利亚分别攻击六年前被以色列占领的西奈半岛和戈兰高地，第四次中东战争爆发。在发动战争的同时，阿拉伯国家第一次发动了石油战，将原油价格从 3 美元提高到 10 美元，暴涨 2 倍多，造成了历史上“第一次石油危机”，西方经济体开始陷入滞胀的泥潭。1979 年 但不能直接对其他银行进行控制。","B":"一旦市场上资金膨胀，美联储会提高同业拆借利率进行调控","C":"美联储宏观调控就是控制的是联邦基金利率","D":"一旦市场经济开始出现危机，美联储可以通过 QE 进行调控"},"answer":"C","material":"材料 37 美国联邦储备局(FED)，美国联邦储备局为美国最高货币政策主管机关，负责保管商业银行准备金、对商业银行贷款及发行联邦储备券。联邦储备局也是制定美国货币政策的首脑机关，1993 年 10 月起，美国经济景气快速攀升，有引发通膨之虞，多亏时任联邦储备理事会主席格林斯潘(Green Span)在不顾民意及政治压力下，连续七次调高重贴现率，使美国经济软着陆成功，免于通货膨胀的威胁。"},{"id":159,"question":"林姐通过自己的专业知识分析认为，国际经济形势不稳定或出现危机预期，实体经济和虚拟经济领域投资机会减少，短期资本机会成本下降，刺激短期资本流从实体经济投资或虚拟经济领域的证券市场分流，流入黄金市场的短期资本流量增加，黄金价格的趋势为（  ）。","options":{"A":"下降趋势","B":"上升趋势","C":"窄幅波动","D":"横盘震荡"},"answer":"B","material":"材料 38 林姐今年 32 岁，是一位全职妈妈，老公是一家上市公司高管，家境殷实。林姐在生下二胎后开始做全职妈妈，由于以前是金融专业硕士，所以对于投资非常热衷，股票，期货，黄金，原油等投资产品都非常内行。特别是在 2020 年疫情爆发后，以黄金和原油为代表的投资产品出现大涨大跌，林姐更是如鱼得水，在不同的投资产品中寻找投机机会，左右逢源。"},{"id":160,"question":"林姐在做黄金和原油的操作分析时认为，不属于黄金价格和原油价格共同影响因素的是（  ）。","options":{"A":"美元汇率波动引发黄金价格和原油价格的同向波动。","B":"高原油价格加剧通货膨胀，通货膨胀引发黄金价格上涨。","C":"原油价格和黄金价格都受国际政治局势的影响。","D":"当原油价格低迷时，游资选择黄金市场。"},"answer":"D","material":"材料 38 林姐今年 32 岁，是一位全职妈妈，老公是一家上市公司高管，家境殷实。林姐在生下二胎后开始做全职妈妈，由于以前是金融专业硕士，所以对于投资非常热衷，股票，期货，黄金，原油等投资产品都非常内行。特别是在 2020 年疫情爆发后，以黄金和原油为代表的投资产品出现大涨大跌，林姐更是如鱼得水，在不同的投资产品中寻找投机机会，左右逢源。"},{"id":161,"question":"对于林姐这种短线操作的资深投资者，炒单手法中描述错误的是（  ）。","options":{"A":"即以趋势为原则，根据盘面的动态反映，抓取每天价格波动里的波纹式的极小差价，进行顺势短线而主动买卖的炒作行为。","B":"以趋势性炒作为主流，以逆趋势炒作为辅，主要依据盘面的动态反映，抓取每天价格波动里的波纹式涨跌里的极小差价，进行顺势主动买卖和被动抓取回调或反弹的炒作行为。","C":"一种鲜为人见的炒单手法，炒作时必须是同一市场同一品种。在涨势当中，选择强势月份合约买入，同时选择弱势月份合约等交易额卖出，以此实现获利的目的。做空则反之。","D":"顺着当前的趋势进行买卖。如果当前趋势涨就买入开仓，当前趋势跌就卖出"},"answer":"D","material":"材料 38 林姐今年 32 岁，是一位全职妈妈，老公是一家上市公司高管，家境殷实。林姐在生下二胎后开始做全职妈妈，由于以前是金融专业硕士，所以对于投资非常热衷，股票，期货，黄金，原油等投资产品都非常内行。特别是在 2020 年疫情爆发后，以黄金和原油为代表的投资产品出现大涨大跌，林姐更是如鱼得水，在不同的投资产品中寻找投机机会，左右逢源。"},{"id":162,"question":"由于林姐是资深投资者，涉猎的投资品种也较多，所以林姐也会经常用到套利的操作，关于套利说法错误的是（  ）。","options":{"A":"实物资产或金融资产拥有两个价格的情况下，以较低的价格买进，较高的价格卖出，从而获取无风险收益。","B":"纠正市场价格或收益率的异常状况中获利的行动。","C":"同一产品在不同市场的价格出现显著差异，套利即低买高卖，导致价格回归均衡水平的行为。","D":"在价格回归均衡水平后，先了结亏损的头寸，盈利的头寸可以在观望。"},"answer":"D","material":"材料 38 林姐今年 32 岁，是一位全职妈妈，老公是一家上市公司高管，家境殷实。林姐在生下二胎后开始做全职妈妈，由于以前是金融专业硕士，所以对于投资非常热衷，股票，期货，黄金，原油等投资产品都非常内行。特别是在 2020 年疫情爆发后，以黄金和原油为代表的投资产品出现大涨大跌，林姐更是如鱼得水，在不同的投资产品中寻找投机机会，左右逢源。"},{"id":163,"question":"林姐认为基本面分析是（  ），在做基本面分析时，林姐首先列举所有影响黄金行情的因素，然后再一一研究它们对价格的影响，属于质的分析，所以具有一定前瞻性。","options":{"A":"发散性思维","B":"逻辑性思维","C":"理论性思维","D":"经验性思维"},"answer":"C","material":"材料 38 林姐今年 32 岁，是一位全职妈妈，老公是一家上市公司高管，家境殷实。林姐在生下二胎后开始做全职妈妈，由于以前是金融专业硕士，所以对于投资非常热衷，股票，期货，黄金，原油等投资产品都非常内行。特别是在 2020 年疫情爆发后，以黄金和原油为代表的投资产品出现大涨大跌，林姐更是如鱼得水，在不同的投资产品中寻找投机机会，左右逢源。"},{"id":164,"question":"9 月份现货黄金价格跌至 225 元/克，而 9 月期货跌至 227 元/克，此时如何操作，其套期保值的结果如何（  ）？","options":{"A":"该黄金企业在现货市场上面以 225 元/克的价格出售 0.3 吨黄金，同时将 9 月黄金期货价格为 227 元/克的空头合约平仓。黄金现货少卖 20 元/克，黄金期货平仓后盈利 20 元/克，套期保值的结果为期现盈亏正好对冲。","B":"该黄金企业在现货市场上面以 225 元/克的价格出售 0.3 吨黄金，而 9 月黄金期货暂时继续持有，等待盈利继续扩大。","C":"该黄金企业将 9 月黄金期货合约以 227 元/克平仓了结，将 0.3 吨黄金的销售计划延后 1 个月。","D":"该黄金企业在现货市场上面以 225 元/克的价格出售 0.3 吨黄金，同时将 9 月黄金期货价格为 227 元/克的空头合约平仓。黄金现货少卖 20 元/克，黄金期货平仓后盈利 22 元/克，套期保值的结果为锁定销售后额外获得 2 元/克的收益。"},"answer":"A","material":"材料 39 国内某家黄金生产企业，计划在 2019 年 9 月将生产出黄金 0.3 吨，而现在的黄金现货价格为每克 245 元，如果按照这个价格将黄金销售出去，将对企业非常有利，而此时 9 月黄金期货合约价格为 247 元/克。"},{"id":165,"question":"该黄金加工企业在期货市场进行套期保值具体如何操作（  ）？","options":{"A":"以 293 元/克的价格买入 100 手远期期货合约。","B":"以 293 元/克的价格买入 10 手远期期货合约。","C":"以 293 元/克的价格卖出 100 手远期期货合约。","D":"以 293 元/克的价格卖出 10 手远期期货合约。"},"answer":"C","material":"材料 40 国内大型黄金加工企业买入 100 公斤黄金原料补充库存，买入价格为 290 元/克，一旦黄金价格出现下跌，库存的黄金原料将会出现非经营性亏损。此时黄金的远期期货合约价格为 293 元/克。"},{"id":166,"question":"投资者持仓期间，如果出现了人民币汇率快速贬值，则黄金 T+D 的价格将 （  ）。","options":{"A":"上涨","B":"下跌","C":"不变","D":"无法确定"},"answer":"A","material":"材料 41 某投资者在 4 月 1 日晚间 22:30 进行黄金 T+D 投资交易，该投资者 TD 账户有 70 万资金，买入黄金 T+D 标准合约 4 手买入开仓价格 298 元/克，4 月 2 日下午 14:45 进行平仓交易，价格 302 元/克。已知手续费率万分之 7.5，保证金 20%，那么这一次交易中："},{"id":167,"question":"老陈认为在技术分析的三大要素里，（  ）是技术面分析最基本、最核心的因素","options":{"A":"价格沿趋势移动","B":"价格围绕价值波动","C":"市场行为涵盖一切信息","D":"历史会重演"},"answer":"A","material":"材料 42 高级黄金分析师老陈今年 40 岁，在一家黄金企业任职。2020 年初，“新冠肺炎”疫情期间在家办公，通过对黄金基本面以及技术面的多年经验分析，老陈认为 2020 年下半年国际黄金有望冲击 2011 的历史高点 1920 美元，结果在 2020 年 ，不正确的是（  ）。","options":{"A":"风险是客观存在的，是不以人的意志为转移的。","B":"风险的存在是风险发生的前提条件。由风险发生的偶然性和不确定性，我们可以推论出在一定条件下，风险是可变性的。","C":"风险与收益是一体的、共生的。","D":"风险是可以识别的，因而也是杜绝的。"},"answer":"D","material":"材料 50 孙某是一家大型投资公司风险合规部总监，从业二十余年，帮助公司起草拟定了多项投资管理计划。孙某认为，在投资过程中，对于风险的管理往往决定着投资的成败，不同的投资品种，对于风险的管控也有所不同。 特别是在 2020 年，“新冠肺炎”疫情全球肆虐，黄金价格虽然刷新了历史高点，但是在具体投资过程中，很多个人投资者参与的黄金期货和黄金 T+D 产品，由于未能较好的把控黄金价格巨幅震荡的情况，产生了大幅亏损。 所以孙某提示投资者，即使黄金行情趋势明确，也要在具体操作过程中，做 好风险的控制。"},{"id":197,"question":"孙某所在的风险合规部，在具体的投资风险管理中，以下说法不正确的是（  ）","options":{"A":"相关部门及人员分权制衡，职能独立。","B":"黄金投资内部风险中，黄金价格机制条件的把握居于中心地位。","C":"建立分级决策体系。","D":"投资是需要灵活性的，为了提高决策效率，风控可以适当简化，只需要把握对结果的控制就行"},"answer":"D","material":"材料 50 孙某是一家大型投资公司风险合规部总监，从业二十余年，帮助公司起草拟定了多项投资管理计划。孙某认为，在投资过程中，对于风险的管理往往决定着投资的成败，不同的投资品种，对于风险的管控也有所不同。 特别是在 2020 年，“新冠肺炎”疫情全球肆虐，黄金价格虽然刷新了历史高点，但是在具体投资过程中，很多个人投资者参与的黄金期货和黄金 T+D 产品，由于未能较好的把控黄金价格巨幅震荡的情况，产生了大幅亏损。 所以孙某提示投资者，即使黄金行情趋势明确，也要在具体操作过程中，做 好风险的控制。"},{"id":198,"question":"孙某在谈到黄金投资风险基本管理原则时，重点讲到了转移风险原则，以下哪项不是有关转移风险原则的体现：（  ）","options":{"A":"黄金期货和黄金现货同时购买","B":"黄金和白银同时购买","C":"不同交易市场同时购买黄金期货","D":"不同交割月份的黄金合约同时购买"},"answer":"B","material":"材料 50 孙某是一家大型投资公司风险合规部总监，从业二十余年，帮助公司起草拟定了多项投资管理计划。孙某认为，在投资过程中，对于风险的管理往往决定着投资的成败，不同的投资品种，对于风险的管控也有所不同。 特别是在 2020 年，“新冠肺炎”疫情全球肆虐，黄金价格虽然刷新了历史高点，但是在具体投资过程中，很多个人投资者参与的黄金期货和黄金 T+D 产品，由于未能较好的把控黄金价格巨幅震荡的情况，产生了大幅亏损。 所以孙某提示投资者，即使黄金行情趋势明确，也要在具体操作过程中，做 好风险的控制。"},{"id":199,"question":"孙某对于风险控制人员的执行评估考核中，以下哪项不正确：（  ）","options":{"A":"是否能够敏锐把握相关投资机会","B":"是否根据投资计划中的风险控制方案对投资计划进行监控","C":"是否对投资计划出现战略性失误带来的投资风险及时识别并反馈","D":"是否对在投资流程之外的各种客观风险进行监控，例如经纪商经营出现危机、相关政策变化导致黄金投资的客观环境发生变化等"},"answer":"A","material":"材料 50 孙某是一家大型投资公司风险合规部总监，从业二十余年，帮助公司起草拟定了多项投资管理计划。孙某认为，在投资过程中，对于风险的管理往往决定着投资的成败，不同的投资品种，对于风险的管控也有所不同。 特别是在 2020 年，“新冠肺炎”疫情全球肆虐，黄金价格虽然刷新了历史高点，但是在具体投资过程中，很多个人投资者参与的黄金期货和黄金 T+D 产品，由于未能较好的把控黄金价格巨幅震荡的情况，产生了大幅亏损。 所以孙某提示投资者，即使黄金行情趋势明确，也要在具体操作过程中，做 好风险的控制。"},{"id":200,"question":"孙某认为在黄金投资主要风险中，以下哪项不正确:（  ）","options":{"A":"市场风险","B":"信用风险","C":"结算风险","D":"制度风险"},"answer":"D","material":"材料 50 孙某是一家大型投资公司风险合规部总监，
